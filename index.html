      { title: "Le Jardin et l'\xE9preuve", text: "Allah installa Adam et son \xE9pouse Hawwa au Jardin, leur accordant tout en libert\xE9 sauf un arbre interdit. Shaytan les trompa en leur murmurant de fausses promesses d'immortalit\xE9. Ils c\xE9d\xE8rent, go\xFBt\xE8rent du fruit d\xE9fendu, puis se repentirent sinc\xE8rement. Allah leur pardonna mais les fit descendre sur Terre pour y vivre leur vie." },

      { title: "Un homme \xE9lev\xE9 par Allah", text: "Idris est mentionn\xE9 deux fois dans le Coran comme proph\xE8te v\xE9ridique et patient. Allah dit de lui : 'Nous l'avons \xE9lev\xE9 en un lieu sublime.' Selon la tradition islamique, il fut \xE9lev\xE9 au ciel de son vivant \u2014 une gr\xE2ce unique qu'Allah lui accorda en r\xE9compense de sa pi\xE9t\xE9 exceptionnelle." },
      { title: "Le savant pionnier", text: "Selon les r\xE9cits des savants, Idris fut l'un des premiers \xEAtres humains \xE0 \xE9crire avec la plume et \xE0 lire les \xE9crits. Il ma\xEEtrisait l'astronomie, les sciences des \xE9toiles, la couture et l'arithm\xE9tique. Il appela son peuple \xE0 adorer Allah Seul, \xE0 abandonner l'injustice et \xE0 s'\xE9loigner des vices. Sa patience face au rejet fut exemplaire." },
      { title: "Sa place parmi les proph\xE8tes", text: "Le Proph\xE8te Muhammad \uFDFA le rencontra lors du Voyage Nocturne (Isra' wal Mi'raj) au quatri\xE8me ciel. Idris est v\xE9n\xE9r\xE9 comme l'un des grands proph\xE8tes de la lign\xE9e d'Adam, avant le D\xE9luge de N\xFBh. Sa vie illustre que la pi\xE9t\xE9 et la science ne sont pas oppos\xE9es mais se compl\xE8tent dans l'Islam." }

    { id: 3, name: "N\xFBh", arabic: "\u0646\u064F\u0648\u062D", phonetic: "Nouh", trans: "No\xE9", desc: "Le proph\xE8te de l'Arche \u2014 950 ans de mission", icon: "\u26F5", color: "#00cfff", story: [
      { title: "950 ans de da'wa sans rel\xE2che", text: "N\xFBh pr\xEAcha son peuple pendant 950 ans sans jamais se d\xE9courager. Il les appela le jour et la nuit, en public et en priv\xE9, avec douceur et avec fermet\xE9. Pourtant, seule une poign\xE9e de croyants r\xE9pondit \xE0 son appel. Les chefs de son peuple disaient : 'Il n'est qu'un menteur arrogant. Ceux qui le suivent sont les plus mis\xE9rables parmi nous !'" },
      { title: "La construction de l'Arche", text: "Sur ordre d'Allah, N\xFBh construisit une gigantesque arche en plein d\xE9sert, loin de toute mer. Les m\xE9cr\xE9ants se moquaient de lui ouvertement : 'Un charpentier devenu proph\xE8te !' N\xFBh r\xE9pondait avec calme et continuait \xE0 travailler. Quand l'arche fut termin\xE9e, Allah lui ordonna d'embarquer les croyants et un couple de chaque esp\xE8ce animale." },
      { title: "Le Grand D\xE9luge", text: "Le d\xE9luge frappa avec une violence inou\xEFe \u2014 les eaux jaillirent de la terre et tomb\xE8rent du ciel. Le fils de N\xFBh refusa de monter, disant qu'il se r\xE9fugierait sur une montagne. N\xFBh cria : 'Aujourd'hui rien ne prot\xE8ge du d\xE9cret d'Allah !' Son fils p\xE9rit. L'arche navigua sur des vagues comme des montagnes. Puis Allah ordonna \xE0 la terre d'absorber les eaux et l'arche s'immobilisa sur le mont Joudi." },
      { title: "Une nouvelle humanit\xE9", text: "Apr\xE8s le d\xE9luge, N\xFBh et les croyants descendirent de l'arche sur une Terre purifi\xE9e. Allah lui dit : 'Descends avec paix de Notre part.' N\xFBh est consid\xE9r\xE9 comme le deuxi\xE8me p\xE8re de l'humanit\xE9, car toute la descendance actuelle de l'humanit\xE9 vient de lui et de ses fils." }
    ] },
    { id: 4, name: "Hud", arabic: "\u0647\u064F\u0648\u062F", phonetic: "Houd", trans: "Hud", desc: "Proph\xE8te du puissant peuple 'Ad", icon: "\u{1F30A}", color: "#00ff88", story: [
      { title: "Le peuple 'Ad \u2014 orgueil et puissance", text: "Le peuple 'Ad vivait dans la r\xE9gion de l'Ahqaf (actuels \xC9mirats/Y\xE9men). C'\xE9tait une nation d'une puissance physique extraordinaire. Ils b\xE2tissaient des palais et des colonnes immenses dans les montagnes. Leur arrogance les faisait dire : 'Qui est plus fort que nous ?' Ils adoraient des idoles et s'\xE9taient d\xE9tourn\xE9s de la foi de leurs anc\xEAtres." },
      { title: "L'appel courageux de Hud", text: "Hud \xE9tait l'un des leurs \u2014 un homme respect\xE9 parmi le peuple 'Ad. Il les appela \xE0 adorer Allah Seul, \xE0 abandonner les idoles, \xE0 faire preuve d'humilit\xE9 et de gratitude. Il leur rappela les bienfaits d'Allah : la pluie, les richesses, les enfants. Les chefs le trait\xE8rent de 'fou' et de 'menteur'. Ils lui dirent : 'Nos dieux t'ont frapp\xE9 de d\xE9mence !'" },

      { title: "La chamelle miraculeuse d'Allah", text: "Le peuple Thamud demanda \xE0 Salih un signe miraculeux pour croire. Allah fit sortir une chamelle extraordinaire du rocher \u2014 un miracle incontestable. Allah leur ordonna : 'Ne lui faites aucun mal, laissez-la pa\xEEtre librement, sinon un ch\xE2timent douloureux vous atteindra.' Salih leur dit : 'Voici la chamelle d'Allah \u2014 c'est un signe pour vous.'" },

      { title: "Dans le feu \u2014 le miracle divin", text: "Le roi Nemrod ordonna de jeter Ibrahim vivant dans un immense b\xFBcher allum\xE9 depuis des jours. On l'y lan\xE7a avec une catapulte. Allah dit au feu : 'Sois frais et agr\xE9able pour Ibrahim !' Ibrahim en ressortit sain et sauf, sans m\xEAme l'odeur de br\xFBl\xE9. Ce miracle \xE9branla certains c\u0153urs mais Nemrod persista dans son obstination." },
      { title: "Le sacrifice supr\xEAme", text: "Allah \xE9prouva Ibrahim par l'une des \xE9preuves les plus dures : ordonner en r\xEAve de sacrifier son fils Isma'il. Ibrahim informa son fils. Isma'il r\xE9pondit avec une foi remarquable : 'P\xE8re, fais ce qu'on t'ordonne. Tu me trouveras parmi les patients.' Au moment du sacrifice, Allah rempla\xE7a Isma'il par un b\xE9lier et dit : 'Ibrahim, tu as confirm\xE9 le r\xEAve. Nous r\xE9compensons ainsi les vertueux.' Cette \xE9preuve est comm\xE9mor\xE9e chaque ann\xE9e lors de la f\xEAte de l'A\xEFd Al-Adha." },
      { title: "La Ka'ba et la b\xE9n\xE9diction \xE9ternelle", text: "Ibrahim et son fils Isma'il construisirent ensemble la Ka'ba \xE0 La Mecque, en levant ses fondations et en priant : 'Seigneur, accepte ceci de nous, Tu entends tout et sais tout. Envoie parmi eux un Messager de leur sein.' Cette pri\xE8re fut exauc\xE9e 2600 ans plus tard avec la naissance du Proph\xE8te Muhammad \uFDFA." }
    ] },
    { id: 7, name: "Lut", arabic: "\u0644\u064F\u0648\u0637", phonetic: "Lout", trans: "Lot", desc: "Le neveu d'Ibrahim \u2014 Mission dans les cit\xE9s corrompues", icon: "\u{1F3D9}\uFE0F", color: "#ff8c00", story: [
      { title: "La mission de Lut dans Sodome", text: "Lut, neveu d'Ibrahim, fut envoy\xE9 dans les cit\xE9s de Sodome et ses environs, en Jordanie actuelle. Ces populations avaient sombr\xE9 dans des vices que nul peuple avant eux n'avait pratiqu\xE9s \u2014 notamment l'homosexualit\xE9. Lut les appela \xE0 Allah, les avertit du ch\xE2timent divin et leur demanda d'abandonner leurs pratiques. Il fut rejet\xE9 et raill\xE9." },
      { title: "Les anges visiteurs", text: "Un jour, des anges sous forme de jeunes hommes tr\xE8s beaux vinrent chez Lut comme h\xF4tes. La nouvelle se r\xE9pandit en ville et les habitants vinrent en masse avec de mauvaises intentions. Lut \xE9tait angoiss\xE9 pour ses h\xF4tes. Les anges lui dirent : 'Ne crains pas, nous sommes des messagers d'Allah. Pars cette nuit avec ta famille. Ne te retourne pas et ne t'arr\xEAte pas.'" },
      { title: "La destruction des cit\xE9s", text: "\xC0 l'aube, Allah retourna les cit\xE9s coupables sens dessus dessous et fit pleuvoir sur elles des pierres de terre cuite en pluie serr\xE9e. Toute la population fut an\xE9antie. Lut et ses filles furent sauv\xE9s. Sa femme, qui sympathisait avec les pervertis et trahissait Lut en les informant de ses h\xF4tes, p\xE9rit avec les autres. Cette histoire est un avertissement \xE9ternel dans le Coran contre les vices et l'injustice." }
    ] },
    { id: 8, name: "Isma'il", arabic: "\u0625\u0650\u0633\u0652\u0645\u064E\u0627\u0639\u0650\u064A\u0644", phonetic: "Ism\xE2'\xEEl", trans: "Isma\xEBl", desc: "L'anc\xEAtre du Proph\xE8te \uFDFA \u2014 Fils du sacrifice", icon: "\u{1F411}", color: "#ff8c00", story: [
      { title: "Abandonn\xE9 dans le d\xE9sert par amour d'Allah", text: "Ibrahim laissa sa femme Hajar et son nourrisson Isma'il dans la vall\xE9e aride et inhospitali\xE8re de La Mecque \u2014 sur ordre d'Allah. Quand Hajar lui demanda : 'Est-ce Allah qui t'ordonne cela ?' et qu'il r\xE9pondit oui, elle dit avec une foi absolue : 'Alors Il ne nous abandonnera pas.' Ibrahim repartit les larmes aux yeux, priant : 'Seigneur, j'ai \xE9tabli une partie de ma descendance dans une vall\xE9e sans v\xE9g\xE9tation.'" },
      { title: "Le miracle de Zamzam", text: "Hajar courut entre les collines de Safa et Marwa sept fois en cherchant de l'eau pour son b\xE9b\xE9 qui pleurait. C'est l'origine du Sa'y (course) du Hajj et de la Umra. Soudain, sous les talons du petit Isma'il, jaillit la source de Zamzam. Cette eau b\xE9nie attira des tribus qui vinrent s'installer \xE0 La Mecque. Le Proph\xE8te \uFDFA a dit : 'L'eau de Zamzam est pour ce pour quoi on la boit.'" },
      { title: "Le sacrifice qui fonda l'A\xEFd", text: "Quand Isma'il fut grand, Allah ordonna \xE0 Ibrahim en r\xEAve de le sacrifier. Isma'il, inform\xE9, dit : 'P\xE8re, fais ce qu'on t'ordonne. Tu me trouveras parmi les patients.' Au moment du sacrifice, Allah rempla\xE7a Isma'il par un grand b\xE9lier. Cet \xE9v\xE9nement est comm\xE9mor\xE9 chaque ann\xE9e lors de l'A\xEFd Al-Adha par des millions de musulmans." },
      { title: "L'h\xE9ritage proph\xE9tique", text: "Isma'il et Ibrahim construisirent ensemble la Ka'ba. Isma'il ma\xEEtrisait la langue arabe et devint l'anc\xEAtre des tribus arabes du Hijaz. De sa descendance, des si\xE8cles plus tard, naquit Muhammad ibn Abdullah \uFDFA \u2014 le Sceau des Proph\xE8tes." }
    ] },
    { id: 9, name: "Is'haq", arabic: "\u0625\u0650\u0633\u0652\u062D\u064E\u0627\u0642", phonetic: "Is'h\xE2q", trans: "Isaac", desc: "Fils de la promesse divine d'Ibrahim", icon: "\u2B50", color: "#bf5fff", story: [
      { title: "L'annonce miraculeuse", text: "Des anges annonc\xE8rent \xE0 Ibrahim et \xE0 sa femme Sara la naissance d'Is'haq alors que Sara \xE9tait tr\xE8s \xE2g\xE9e et st\xE9rile depuis toujours. Elle s'\xE9tonna : 'Comment enfanterais-je alors que je suis une vieille femme et que mon mari est un vieillard ?' Les anges r\xE9pondirent : 'Est-ce que tu t'\xE9tonnes de l'ordre d'Allah ? Que la mis\xE9ricorde d'Allah et Ses b\xE9n\xE9dictions soient sur vous, gens de la maison !'" },
      { title: "Proph\xE8te et fondateur d'une lign\xE9e", text: "Is'haq fut proph\xE8te et continua la mission de son p\xE8re Ibrahim en Canaan (Palestine actuelle). Il \xE9pousa Rebecca et eut deux fils : Esa\xFC et Ya'qub (Jacob). C'est de la lign\xE9e d'Is'haq que naquit la plupart des grands proph\xE8tes : Ya'qub, Y\xFBsuf, M\xFBsa, Har\xFBn, Dawud, Sulayman, Yahya, Issa \u2014 paix sur eux tous." }
    ] },
    { id: 10, name: "Ya'qub", arabic: "\u064A\u064E\u0639\u0652\u0642\u064F\u0648\u0628", phonetic: "Ya'qoub", trans: "Jacob \u2014 Isra\xEBl", desc: "P\xE8re des douze tribus d'Isra\xEBl", icon: "\u{1F31F}", color: "#00cfff", story: [
      { title: "Isra\xEBl \u2014 le serviteur d'Allah", text: "Ya'qub, fils d'Is'haq et petit-fils d'Ibrahim, re\xE7ut d'Allah le surnom 'Isra\xEBl' qui signifie 'serviteur d'Allah'. Proph\xE8te fid\xE8le, il continua la mission proph\xE9tique en Canaan. Il eut douze fils de plusieurs femmes, qui devinrent les anc\xEAtres des douze tribus d'Isra\xEBl. Son fils le plus aim\xE9 \xE9tait Y\xFBsuf, connu pour sa beaut\xE9 et sa sagesse." },
      { title: "L'\xE9preuve de la s\xE9paration", text: "Quand les fr\xE8res de Y\xFBsuf revinrent pr\xE9tendant que leur fr\xE8re avait \xE9t\xE9 d\xE9vor\xE9 par un loup, Ya'qub refusa de les croire. Il dit avec sagesse : 'Vos \xE2mes vous ont sugg\xE9r\xE9 quelque chose. Mais la patience est belle et c'est d'Allah que j'implore l'aide.' Il pleura tellement la s\xE9paration d'avec Y\xFBsuf qu'il finit par perdre la vue. Mais jamais il ne d\xE9sesp\xE9ra de la mis\xE9ricorde d'Allah." },
      { title: "Les retrouvailles et la gu\xE9rison miraculeuse", text: "Des d\xE9cennies plus tard, Y\xFBsuf, devenu ministre en \xC9gypte, envoya sa chemise \xE0 son p\xE8re : 'Posez-la sur le visage de mon p\xE8re, il recouvrera la vue.' D\xE8s que la chemise fut pos\xE9e sur son visage, Ya'qub retrouva la vue imm\xE9diatement. La famille enti\xE8re se r\xE9unit en \xC9gypte, accomplissant le r\xEAve proph\xE9tique de Y\xFBsuf. Ya'qub dit alors : 'Je savais ce que vous ne saviez pas \u2014 j'esp\xE9rais en la gr\xE2ce d'Allah.'" }
    ] },
    { id: 11, name: "Y\xFBsuf", arabic: "\u064A\u064F\u0648\u0633\u064F\u0641", phonetic: "Youssouf", trans: "Joseph", desc: "Ahsanul Qasas \u2014 Le plus beau des r\xE9cits", icon: "\u{1F451}", color: "#bf5fff", story: [
      { title: "Le r\xEAve proph\xE9tique de l'enfant", text: "Y\xFBsuf raconta \xE0 son p\xE8re un r\xEAve : 'J'ai vu onze \xE9toiles, le soleil et la lune se prosterner devant moi.' Ya'qub comprit que c'\xE9tait un signe proph\xE9tique et le mit en garde : 'Ne le raconte pas \xE0 tes fr\xE8res, sinon par jalousie ils pourraient te tendre un pi\xE8ge. Shaytan est un ennemi d\xE9clar\xE9 de l'homme.' Y\xFBsuf \xE9tait le plus aim\xE9 de Ya'qub pour sa sagesse et sa bont\xE9 \u2014 ce qui attisa la jalousie de ses fr\xE8res." },
      { title: "Le puits, l'esclavage et la prison", text: "Ses fr\xE8res l'emmen\xE8rent en pr\xE9textant une sortie et le jet\xE8rent dans un puits. Des caravaniers le recueillirent et le vendirent comme esclave en \xC9gypte. Dans la maison du ministre \xE9gyptien Al-Aziz, sa femme Zulaykh\xE2 le tenta. Y\xFBsuf refusa avec dignit\xE9 : 'Je cherche refuge en Allah !' Il pr\xE9f\xE9ra la prison plut\xF4t que de c\xE9der au p\xE9ch\xE9. Allah n'abandonne pas Ses serviteurs sinc\xE8res." },
      { title: "L'interpr\xE9tation des r\xEAves \u2014 la sagesse divine", text: "En prison, Y\xFBsuf interpr\xE9ta les r\xEAves de deux cod\xE9tenus avec pr\xE9cision. Puis le roi d'\xC9gypte fit un r\xEAve troublant que nul ne put interpr\xE9ter. L'ancien cod\xE9tenu se souvint de Y\xFBsuf. Il interpr\xE9ta : sept vaches grasses d\xE9vor\xE9es par sept maigres = sept ans d'abondance puis sept ans de terrible famine. Sa sagesse impressionna tellement le roi qu'il le lib\xE9ra et le nomma ministre des finances et des greniers." },
      { title: "Le pardon royal \u2014 une le\xE7on pour l'\xE9ternit\xE9", text: "Durant la famine, ses fr\xE8res vinrent d'Egypte demander des vivres sans le reconna\xEEtre. Apr\xE8s plusieurs \xE9pisodes, Y\xFBsuf se r\xE9v\xE9la \xE0 eux. Ils s'attendaient \xE0 une vengeance terrible. Y\xFBsuf dit alors ces mots immortels : 'Pas de reproche sur vous aujourd'hui. Qu'Allah vous pardonne \u2014 Il est le plus Mis\xE9ricordieux des mis\xE9ricordieux.' La famille enti\xE8re fut r\xE9unie. Le r\xEAve de l'enfant s'\xE9tait accompli : ses parents et ses fr\xE8res se prostern\xE8rent devant lui." }
    ] },
    { id: 12, name: "Ayyub", arabic: "\u0623\u064E\u064A\u064F\u0651\u0648\u0628", phonetic: "Ayyoub", trans: "Job", desc: "Le symbole de la patience absolue en Allah", icon: "\u{1F4AA}", color: "#00cfff", story: [
      { title: "De la richesse \xE0 l'\xE9preuve totale", text: "Ayyub \xE9tait un proph\xE8te qui vivait dans le confort et la richesse, entour\xE9 d'une grande famille et jouissant d'une excellente sant\xE9. Allah l'\xE9prouva graduellement en lui \xF4tant ses biens, puis ses enfants, puis sa sant\xE9. Il fut atteint d'une maladie grave pendant de tr\xE8s longues ann\xE9es. Ses proches l'abandonn\xE8rent un \xE0 un. Seule sa femme fid\xE8le resta \xE0 ses c\xF4t\xE9s pour le servir." },
      { title: "La patience in\xE9branlable", text: "Malgr\xE9 ces \xE9preuves accumul\xE9es qui auraient bris\xE9 n'importe qui, Ayyub ne cessa jamais d'\xEAtre reconnaissant envers Allah et de L'adorer. Il ne prof\xE9ra aucune parole de m\xE9contentement. Le Coran le d\xE9crit ainsi : 'Nous avons trouv\xE9 en lui un homme excellent, souvent repentant.' Sa patience ne venait pas de l'insensibilit\xE9 mais d'une foi profonde en la sagesse d'Allah." },
      { title: "La dou'a de la d\xE9tresse et la gu\xE9rison", text: "Apr\xE8s ses longues souffrances, Ayyub invoqua humblement : 'Seigneur, l'adversit\xE9 m'a touch\xE9 et Tu es le plus Mis\xE9ricordieux des mis\xE9ricordieux.' Allah exau\xE7a imm\xE9diatement sa pri\xE8re. Il lui dit : 'Frappe le sol du pied \u2014 voici une eau fra\xEEche pour te laver et te d\xE9salt\xE9rer.' Allah le gu\xE9rit, lui rendit sa famille et doubla ses biens. Cette dou'a est recommand\xE9e pour toute \xE9preuve ou maladie." }
    ] },
    { id: 13, name: "Shu'ayb", arabic: "\u0634\u064F\u0639\u064E\u064A\u0652\u0628", phonetic: "Chou'ayb", trans: "Jethro", desc: "L'\xE9loquent des proph\xE8tes \u2014 Mission contre la fraude", icon: "\u2696\uFE0F", color: "#ffd700", story: [
      { title: "La fraude end\xE9mique de Madyan", text: "Shu'ayb fut envoy\xE9 au peuple de Madyan, une cit\xE9 commer\xE7ante prosp\xE8re de la p\xE9ninsule arabique. Ces marchands fraudaient syst\xE9matiquement dans les mesures et les poids \u2014 donnant moins que ce qui \xE9tait d\xFB, prenant plus que ce qui \xE9tait convenu. Shu'ayb les appela : '\xD4 mon peuple, adorez Allah, vous n'avez pas d'autre dieu que Lui. Ne fraudez pas dans la mesure et le poids. Je vous vois dans le bien-\xEAtre mais je crains pour vous le ch\xE2timent d'un jour qui vous enveloppera.'" },
      { title: "Le rejet et les menaces", text: "Les notables et les riches r\xE9pondirent avec m\xE9pris : 'Tes pri\xE8res t'ordonnent-elles d'abandonner ce que nos p\xE8res adoraient ou de ne pas faire de nos biens ce que nous voulons ? Tu es vraiment l'indulgent, le raisonnable !' (sur un ton moqueur). Ils mena\xE7aient Shu'ayb et ses croyants de les chasser ou de les forcer \xE0 abandonner leur foi. Shu'ayb r\xE9pondit que seul Allah pouvait les sauver ou les perdre." },
      { title: "Le jour terrible", text: "Le peuple de Madyan nia obstin\xE9ment les avertissements. Un jour, une nu\xE9e sombre s'amassa au-dessus d'eux. Ils crurent que c'\xE9tait la pluie. C'\xE9tait le ch\xE2timent divin. Une terrible secousse les frappa et ils s'effondr\xE8rent morts dans leurs demeures. Shu'ayb dit alors : '\xD4 mon peuple, j'ai bien transmis les messages de mon Seigneur et vous ai prodigu\xE9 de bons conseils. Comment pourrais-je m'affliger d'un peuple m\xE9cr\xE9ant ?'" }
    ] },
    { id: 14, name: "M\xFBsa", arabic: "\u0645\u064F\u0648\u0633\u064E\u0649", phonetic: "Mouss\xE2", trans: "Mo\xEFse", desc: "Kalimullah \u2014 Celui qu'Allah a interpell\xE9 directement", icon: "\u26A1", color: "#ffdd00", story: [
      { title: "La naissance sous la menace", text: "Pharaon faisait tuer tous les nouveau-n\xE9s m\xE2les des Isra\xE9lites par crainte d'une proph\xE9tie. Allah inspira la m\xE8re de M\xFBsa : 'Allaite-le puis quand tu le craindras, jette-le dans le fleuve.' Elle pla\xE7a le nourrisson dans un panier sur le Nil. Le panier fut retrouv\xE9 par la famille de Pharaon. La s\u0153ur de M\xFBsa observa de loin et proposa une nourrice \u2014 ainsi M\xFBsa fut rendu \xE0 sa propre m\xE8re." },
      { title: "Le buisson ardent \u2014 la r\xE9v\xE9lation divine", text: "Devenu adulte et ayant fui l'\xC9gypte apr\xE8s avoir accidentellement tu\xE9 un homme, M\xFBsa se retrouva \xE0 Madyan o\xF9 il travailla dix ans pour un homme pieux (Shu'ayb selon la tradition). Un jour, voyageant avec sa famille, il vit un feu. En s'approchant, une voix l'interpella : '\xD4 M\xFBsa, Moi, Je suis Allah, le Seigneur des Mondes ! Jette ton b\xE2ton !' Le b\xE2ton devint un serpent g\xE9ant. C'\xE9tait le d\xE9but d'une mission immense." },
      { title: "Retour en \xC9gypte \u2014 face \xE0 Pharaon", text: "Allah envoya M\xFBsa et son fr\xE8re Har\xFBn affronter Pharaon avec neuf signes miraculeux : le b\xE2ton-serpent, la main blanche, le d\xE9luge, les sauterelles, les poux, les grenouilles, le sang, etc. Pharaon traitait M\xFBsa de sorcier et refusait de lib\xE9rer les Isra\xE9lites. Malgr\xE9 des ann\xE9es de confrontation, son orgueil l'emp\xEAcha de croire." },
      { title: "La travers\xE9e de la mer \u2014 le miracle ultime", text: "Pharaon finit par lib\xE9rer les Isra\xE9lites apr\xE8s la mort des premiers-n\xE9s. Mais il changea d'avis et les poursuivit avec son arm\xE9e. Accul\xE9s contre la mer Rouge, les Isra\xE9lites d\xE9sesp\xE9r\xE8rent. M\xFBsa dit : 'Non ! Mon Seigneur est avec moi, Il me guidera !' Allah ordonna \xE0 M\xFBsa de frapper la mer de son b\xE2ton \u2014 elle se fendit en douze chemins secs. Pharaon s'engouffra \xE0 leur poursuite et fut englouti. Ses derniers mots furent : 'Je crois qu'il n'y a de dieu que Celui en qui croient les enfants d'Isra\xEBl !'" },
      { title: "La Torah et les 40 nuits", text: "M\xFBsa re\xE7ut la Torah sur le mont Sina\xEF lors d'un rendez-vous de 40 nuits avec Allah. Durant son absence, son peuple fut tromp\xE9 par As-Samir\xEE qui fabriqua un veau d'or. M\xFBsa revint furieux, saisit son fr\xE8re Har\xFBn par la barbe et brisa les tablettes. Il invoqua Allah pour son peuple. Allah lui dit : 'Je ch\xE2tie qui Je veux, mais Ma mis\xE9ricorde englobe toute chose.'" }
    ] },
    { id: 15, name: "Har\xFBn", arabic: "\u0647\u064E\u0627\u0631\u064F\u0648\u0646", phonetic: "H\xE2roun", trans: "Aaron", desc: "Le fr\xE8re et soutien de M\xFBsa", icon: "\u{1F4EF}", color: "#bf5fff", story: [
      { title: "Le don accord\xE9 \xE0 M\xFBsa", text: "Quand Allah confia \xE0 M\xFBsa la mission d'affronter Pharaon, M\xFBsa ressentit sa faiblesse et invoqua : 'Seigneur, donne-moi un aide de ma famille \u2014 mon fr\xE8re Har\xFBn. Renforce gr\xE2ce \xE0 lui ma force, associe-le \xE0 ma mission.' Allah exau\xE7a sa pri\xE8re et fit de Har\xFBn un proph\xE8te \xE0 ses c\xF4t\xE9s. Har\xFBn \xE9tait connu pour son \xE9loquence \u2014 l\xE0 o\xF9 M\xFBsa avait un d\xE9faut d'\xE9locution." },
      { title: "La mission commune", text: "M\xFBsa et Har\xFBn affront\xE8rent ensemble Pharaon et les sorciers. Har\xFBn g\xE9rait le peuple d'Isra\xEBl pendant les absences de M\xFBsa sur le Sina\xEF. Quand M\xFBsa revint et trouva son peuple adorant le veau d'or, Har\xFBn lui expliqua son impuissance : 'Fils de ma m\xE8re, ne me saisis ni par la barbe ni par la t\xEAte. J'ai craint que tu ne dises : tu as divis\xE9 les Isra\xE9lites.'" },
      { title: "Une mort douce sur le mont Hor", text: "Har\xFBn mourut avant d'atteindre la Terre Promise. Selon la tradition, il d\xE9c\xE9da paisiblement sur le mont Hor apr\xE8s que M\xFBsa l'y eut accompagn\xE9. Les Isra\xE9lites, jaloux, accus\xE8rent faussement M\xFBsa de l'avoir tu\xE9. La grandeur d'Har\xFBn \xE9tait son d\xE9vouement total \xE0 la mission de son fr\xE8re et \xE0 la cause d'Allah." }
    ] },
    { id: 16, name: "Dhul-Kifl", arabic: "\u0630\u064F\u0648 \u0627\u0644\u0643\u0650\u0641\u0652\u0644", phonetic: "Dhoul-Kifl", trans: "Celui de la responsabilit\xE9", desc: "Proph\xE8te de la patience et de la promesse", icon: "\u{1F91D}", color: "#00ff88", story: [
      { title: "L'homme de la promesse", text: "Dhul-Kifl est mentionn\xE9 deux fois dans le Coran parmi les proph\xE8tes patients. Son nom signifie 'celui qui prend en charge' ou 'celui de la responsabilit\xE9'. Selon les r\xE9cits, il prit un engagement solennel de prier, je\xFBner et juger avec \xE9quit\xE9 \u2014 et il tint sa promesse toute sa vie." },
      { title: "La patience face aux \xE9preuves", text: "Dhul-Kifl est cit\xE9 par Allah aux c\xF4t\xE9s d'Isma'il et Ayyub comme exemple de patience et de bont\xE9. Il endura les tentations et les provocations sans jamais c\xE9der. Allah dit de lui et de ses compagnons : 'Nous les avons b\xE9nis avec Notre mis\xE9ricorde car ils \xE9taient parmi les vertueux.'" }
    ] },
    { id: 17, name: "Dawud", arabic: "\u062F\u064E\u0627\u0648\u064F\u0648\u062F", phonetic: "D\xE2woud", trans: "David", desc: "Proph\xE8te, roi et psalmodiste d'Allah", icon: "\u{1F5E1}\uFE0F", color: "#ffd700", story: [
      { title: "David contre Goliath", text: "Alors que l'arm\xE9e des Isra\xE9lites tremblait devant le g\xE9ant Jalut (Goliath), le jeune Dawud \u2014 simple berger \u2014 se proposa pour l'affronter. Les soldats le regard\xE8rent avec scepticisme. Avec sa foi en Allah et son courage, il terrassa Jalut d'une seule pierre lanc\xE9e avec sa fronde. Sa victoire miraculeuse changea le cours de l'histoire." },
      { title: "Le roi proph\xE8te", text: "Allah accorda \xE0 Dawud la royaut\xE9, la sagesse et la connaissance. Il lui apprit \xE0 fabriquer des cottes de mailles \u2014 une r\xE9volution militaire. Allah assujettit les montagnes et les oiseaux qui glorifiaient Allah avec Dawud. Le fer s'amollissait entre ses mains par miracle divin pour fabriquer les armures." },
      { title: "Les Psaumes \u2014 le Zabur", text: "Allah r\xE9v\xE9la \xE0 Dawud le Zabur (les Psaumes), un livre saint de glorifications et de pri\xE8res magnifiques. Sa voix \xE9tait d'une beaut\xE9 surnaturelle \u2014 hommes, animaux et montagnes s'arr\xEAtaient pour l'\xE9couter psalmodier les louanges d'Allah. Il pleurait beaucoup par crainte d'Allah et \xE9tait extr\xEAmement aust\xE8re malgr\xE9 sa puissance royale." }
    ] },
    { id: 18, name: "Sulayman", arabic: "\u0633\u064F\u0644\u064E\u064A\u0652\u0645\u064E\u0627\u0646", phonetic: "Soulaym\xE2n", trans: "Salomon", desc: "Le roi des hommes, des djinns et des animaux", icon: "\u{1F48E}", color: "#00cfff", story: [
      { title: "Un royaume sans pareil", text: "Sulayman, fils de Dawud, h\xE9rita de la proph\xE9tie et du royaume. Il pria Allah : 'Seigneur, pardonne-moi et accorde-moi un royaume qui ne conviendra \xE0 personne apr\xE8s moi.' Allah lui accorda un pouvoir unique : la ma\xEEtrise des vents, le langage des animaux et des oiseaux, le commandement des djinns qui construisaient pour lui des palais, des statues, des bassins et des chaudi\xE8res immenses." },
      { title: "La huppe et la reine de Saba", text: "Un jour, la huppe manquait \xE0 l'appel. Elle revint avec une nouvelle \xE9tonnante : 'J'ai vu une reine, Bilq\xEEs, qui r\xE8gne sur Saba avec un tr\xF4ne magnifique, mais elle et son peuple adorent le soleil.' Sulayman lui envoya une lettre commen\xE7ant par Bismillah et l'invitant \xE0 l'Islam. La reine, impressionn\xE9e, vint le voir. Elle embrassa l'Islam apr\xE8s avoir vu son tr\xF4ne transport\xE9 en un clin d'\u0153il." },
      { title: "La mort et les djinns", text: "Quand Sulayman mourut appuy\xE9 sur son b\xE2ton, les djinns continu\xE8rent \xE0 travailler des mois sans savoir qu'il \xE9tait mort. Ce n'est que lorsqu'un ver rongea son b\xE2ton et qu'il tomba que les djinns comprirent. Ainsi Allah montra que les djinns ne connaissent pas le monde invisible." }
    ] },
    { id: 19, name: "Ilyas", arabic: "\u0625\u0650\u0644\u0652\u064A\u064E\u0627\u0633", phonetic: "Ily\xE2s", trans: "\xC9lie", desc: "Proph\xE8te envoy\xE9 contre l'idol\xE2trie de Ba'l", icon: "\u26A1", color: "#ff8c00", story: [
      { title: "La lutte contre l'idole Ba'l", text: "Ilyas fut envoy\xE9 \xE0 un peuple qui adorait une idole appel\xE9e Ba'l tout en pr\xE9tendant croire en Allah. Il les appela \xE0 abandonner Ba'l et \xE0 revenir \xE0 l'adoration d'Allah Seul. Il leur dit : 'Adorez-vous Ba'l et abandonnez-vous le meilleur des cr\xE9ateurs \u2014 Allah, votre Seigneur et le Seigneur de vos p\xE8res les plus anciens ?'" },
      { title: "Le rejet et la fuite", text: "Son peuple le rejeta avec v\xE9h\xE9mence. Ilyas fut contraint de fuir. Allah l'\xE9leva et le pr\xE9serva. Le Coran dit de lui : 'Il est certes parmi Nos serviteurs croyants.' Sa m\xE9moire fut pr\xE9serv\xE9e pour les g\xE9n\xE9rations futures : 'Paix sur Ilyas !' \u2014 une salutation qu'Allah Lui-m\xEAme lui adresse dans le Coran." }
    ] },
    { id: 20, name: "Al-Yasa'", arabic: "\u0627\u0644\u064A\u064E\u0633\u064E\u0639", phonetic: "Al-Yasa'", trans: "\xC9lis\xE9e", desc: "Successeur du proph\xE8te Ilyas", icon: "\u{1F30A}", color: "#00ff88", story: [
      { title: "Le successeur fid\xE8le", text: "Al-Yasa' fut le successeur et le disciple du proph\xE8te Ilyas. Il continua sa mission aupr\xE8s des Isra\xE9lites, les appelant \xE0 la foi pure en Allah. Le Coran le place parmi les meilleurs proph\xE8tes : 'Al-Yasa', Dhul-Kifl \u2014 tous font partie des vertueux.'" },
      { title: "Un proph\xE8te parmi les meilleurs", text: "Allah le cita dans le Coran en lui accordant une mention d'honneur parmi Ses proph\xE8tes \xE9lus. Bien que les d\xE9tails de sa vie soient peu mentionn\xE9s dans les textes islamiques, sa place parmi les proph\xE8tes de la lign\xE9e d'Ibrahim est incontestable." }
    ] },
    { id: 21, name: "Yunus", arabic: "\u064A\u064F\u0648\u0646\u064F\u0633", phonetic: "Younous", trans: "Jonas", desc: "Dhul-Nun \u2014 L'homme de la baleine", icon: "\u{1F40B}", color: "#ff6b9d", story: [
      { title: "Le d\xE9part pr\xE9cipit\xE9", text: "Yunus fut envoy\xE9 \xE0 Ninive (actuelle Mossoul en Irak), une ville de plus de 100 000 habitants. Apr\xE8s des ann\xE9es de pr\xE9dication infructueuse, il se d\xE9couragea et quitta sa mission sans autorisation divine. Il monta sur un bateau. Une temp\xEAte terrible secoua le navire \u2014 les marins tir\xE8rent au sort pour jeter quelqu'un \xE0 la mer. Le sort tomba sur Yunus." },
      { title: "Dans le ventre de la baleine", text: "Une baleine l'avala. Dans les t\xE9n\xE8bres triples (ventre de la baleine, fond de la mer, nuit), Yunus invoqua avec une foi sinc\xE8re : 'Il n'y a de dieu que Toi ! Gloire \xE0 Toi ! J'ai \xE9t\xE9 du nombre des injustes !' \u2014 C'est la Dou'a de Yunus, l'une des plus puissantes invocations de l'Islam. Allah exau\xE7a imm\xE9diatement et la baleine le rejeta sur un rivage." },
      { title: "Le retour et le succ\xE8s", text: "Allah fit pousser miraculeusement une plante (une courge) sur lui pour le couvrir et le nourrir dans sa faiblesse. Gu\xE9ri, Yunus retourna \xE0 sa mission. Cette fois, tout le peuple de Ninive crut \xE0 son appel \u2014 100 000 personnes ou plus, selon le Coran. Ce fut l'une des plus grandes conversions collectives de l'histoire des proph\xE8tes." }
    ] },
    { id: 22, name: "Zakariyya", arabic: "\u0632\u064E\u0643\u064E\u0631\u0650\u064A\u064E\u0651\u0627", phonetic: "Zakariyy\xE2", trans: "Zacharie", desc: "Le gardien de Maryam et p\xE8re de Yahya", icon: "\u{1F33A}", color: "#bf5fff", story: [
      { title: "Le gardien de Maryam", text: "Zakariyya \xE9tait le grand pr\xEAtre du Temple de J\xE9rusalem et l'oncle de Maryam (Marie). Il fut d\xE9sign\xE9 comme tuteur de la jeune Maryam. Chaque fois qu'il entrait dans sa chambre de retraite au temple, il trouvait une nourriture miraculeuse. Il lui demanda : 'D'o\xF9 te vient ceci ?' Elle r\xE9pondit : 'Cela vient d'Allah. Allah accorde Ses dons \xE0 qui Il veut sans compter.'" },
      { title: "La pri\xE8re du vieillard d\xE9sesp\xE9r\xE9", text: "Touch\xE9 par ce miracle, Zakariyya invoqua Allah : 'Seigneur, accorde-moi de Ta part une bonne descendance. Tu entends les pri\xE8res.' Or Zakariyya \xE9tait tr\xE8s vieux et sa femme st\xE9rile depuis toujours. Les anges lui annonc\xE8rent : 'Allah t'annonce Yahya, qui confirmera une parole d'Allah, sera un ma\xEEtre, un chaste et un proph\xE8te parmi les vertueux.'" },
      { title: "Le signe du silence", text: "Zakariyya demanda un signe. Allah lui dit : 'Ton signe est de ne pas parler aux gens pendant trois jours.' Durant ces trois jours, Zakariyya ne pouvait s'exprimer que par gestes. Il passait ses journ\xE9es \xE0 faire la glorification d'Allah dans le silence. Puis Yahya naquit, accomplissant la promesse divine." }
    ] },
    { id: 23, name: "Yahya", arabic: "\u064A\u064E\u062D\u0652\u064A\u064E\u0649", phonetic: "Yahy\xE2", trans: "Jean-Baptiste", desc: "Confirmateur du Messie \u2014 Proph\xE8te de la puret\xE9", icon: "\u{1F54A}\uFE0F", color: "#00cfff", story: [
      { title: "Un enfant unique", text: "Yahya fut un enfant miraculeux \u2014 n\xE9 d'un p\xE8re tr\xE8s vieux et d'une m\xE8re st\xE9rile par la gr\xE2ce d'Allah. Il re\xE7ut son nom directement d'Allah : 'Yahya' \u2014 un nom qu'aucun homme n'avait port\xE9 avant lui. D\xE8s son enfance, Allah dit de lui : '\xD4 Yahya, prends le Livre avec force !' Enfant, il refusait de jouer avec ses camarades et pr\xE9f\xE9rait la m\xE9ditation et l'adoration." },
      { title: "Le proph\xE8te de la Tawra et de la nature", text: "Yahya vivait dans la nature, s'habillait de poils de chameau et se nourrissait de sauterelles et de miel sauvage. Il \xE9tait d'une puret\xE9 et d'une asc\xE8se absolues. Il confirmait l'arriv\xE9e prochaine du Messie Issa. Il appelait les gens \xE0 se repentir et se purifier. Le Coran le d\xE9crit : 'plein de bont\xE9 et de pi\xE9t\xE9, et pieux envers ses parents \u2014 il ne fut jamais orgueilleux ni rebelle.'" },
      { title: "Un martyr de la v\xE9rit\xE9", text: "Yahya fut assassin\xE9 par le roi H\xE9rode Antipas qui le fit d\xE9capiter pour avoir condamn\xE9 son mariage illicite avec la femme de son fr\xE8re. Il mourut martyr de la v\xE9rit\xE9 sans jamais avoir c\xE9d\xE9. Allah lui accorda la paix le jour de sa naissance, le jour de sa mort et le jour o\xF9 il sera ressuscit\xE9." }
    ] },
    { id: 24, name: "Issa", arabic: "\u0639\u0650\u064A\u0633\u064E\u0649", phonetic: "'Iss\xE2", trans: "J\xE9sus", desc: "Ruhullah \u2014 L'Esprit d'Allah et son Verbe", icon: "\u2728", color: "#ffd700", story: [
      { title: "La naissance miraculeuse de Maryam", text: "Maryam \xE9tait une femme pure et vierge, consacr\xE9e au service du Temple. L'ange Jibr\xEEl lui apparut sous forme humaine. Elle eut peur. L'ange dit : 'Je suis l'envoy\xE9 de ton Seigneur pour te donner un fils pur.' Elle demanda : 'Comment aurais-je un fils, alors qu'aucun homme ne m'a touch\xE9e ?' Il r\xE9pondit : 'Ainsi dit Allah : c'est chose facile pour Moi.' Issa naquit sans p\xE8re \u2014 un miracle unique dans l'histoire." },
      { title: "Les miracles de l'Envoy\xE9", text: "Allah accorda \xE0 Issa des miracles extraordinaires : il parla dans son berceau pour d\xE9fendre l'honneur de sa m\xE8re. Il fa\xE7onnait des oiseaux d'argile et soufflait dedans \u2014 ils s'envolaient vivants. Il gu\xE9rissait les aveugles-n\xE9s et les l\xE9preux. Il ressuscitait des morts par permission d'Allah. Il savait ce que les gens avaient mang\xE9 et stock\xE9 chez eux. Ces miracles t\xE9moignaient de sa mission proph\xE9tique." },
      { title: "La table c\xE9leste", text: "Les disciples de Issa lui demand\xE8rent : 'Ton Seigneur peut-Il faire descendre une table servie du ciel ?' Issa pria Allah. Une table garnie de nourriture descendit du ciel \u2014 un signe et une f\xEAte pour eux. Allah avertit ceux qui m\xE9croiraient apr\xE8s ce signe d'un ch\xE2timent unique dans l'histoire." },
      { title: "L'\xE9l\xE9vation et le retour annonc\xE9", text: "Les ennemis de Issa complot\xE8rent pour le tuer. Mais Allah dit : 'Ils ne l'ont ni tu\xE9 ni crucifi\xE9 \u2014 ils n'en ont eu que l'illusion.' Allah l'\xE9leva vivant vers Lui. Le Proph\xE8te Muhammad \uFDFA annon\xE7a que Issa reviendra \xE0 la fin des temps, brisera la croix, tuera le Dajjal, \xE9tablira la justice sur Terre et mourra naturellement." }
    ] },
    { id: 25, name: "Muhammad \uFDFA", arabic: "\u0645\u064F\u062D\u064E\u0645\u064E\u0651\u062F\u064C \uFDFA", phonetic: "Muhammad", trans: "Le Lou\xE9", desc: "Khatam An-Nabiyyin \u2014 Le Sceau des Proph\xE8tes", icon: "\u{1F319}", color: "#ffd700", story: [
      { title: "L'orphelin de La Mecque", text: "Muhammad \uFDFA naquit \xE0 La Mecque vers 570 EC, l'Ann\xE9e de l'\xC9l\xE9phant. Son p\xE8re Abdullah mourut avant sa naissance. Sa m\xE8re \xC2mina mourut quand il avait 6 ans. Orphelin, il fut \xE9lev\xE9 d'abord par son grand-p\xE8re Abdul Muttalib puis par son oncle Abu Talib. D\xE8s son enfance, il \xE9tait connu par tous pour son honn\xEAtet\xE9 et son int\xE9grit\xE9 \u2014 les Mecquois l'appelaient Al-Amin, 'le Digne de confiance'." },
      { title: "La premi\xE8re r\xE9v\xE9lation \u2014 Iqra'", text: "\xC0 40 ans, lors d'une retraite spirituelle dans la grotte de Hira, l'ange Jibr\xEEl lui apparut et le pressa trois fois : 'Iqra' ! \u2014 Lis !' Muhammad \uFDFA r\xE9pondit qu'il ne savait pas lire. Jibr\xEEl lui r\xE9v\xE9la les premiers versets du Coran : 'Lis au nom de ton Seigneur qui a cr\xE9\xE9 \u2014 Il a cr\xE9\xE9 l'homme d'une adh\xE9rence.' Muhammad \uFDFA rentra tremblant chez Khadija. Elle le r\xE9conforta et il re\xE7ut les r\xE9v\xE9lations pendant 23 ans." },
      { title: "13 ans de pers\xE9cution \xE0 La Mecque", text: "Pendant 13 ans, le Proph\xE8te \uFDFA et ses Compagnons endur\xE8rent des pers\xE9cutions terribles \xE0 La Mecque : torture, boycott \xE9conomique, insultes, tentatives d'assassinat. Il perdit ses proches les plus chers : Khadija, son oncle Abu Talib. Il fut lapid\xE9 \xE0 Ta\xEFf jusqu'au sang. Jamais il ne r\xE9pondit par la violence, faisant preuve d'une patience et d'un pardon extraordinaires." },
      { title: "L'H\xE9gire \u2014 le tournant de l'Islam", text: "En 622 EC, le Proph\xE8te \uFDFA \xE9migra de La Mecque \xE0 M\xE9dine \u2014 c'est la Hijra qui marque le d\xE9but du calendrier islamique. \xC0 M\xE9dine, il construisit la premi\xE8re mosqu\xE9e, \xE9tablit la fraternit\xE9 entre Emigrants et M\xE9dinois, r\xE9digea la Constitution de M\xE9dine et posa les fondements de la premi\xE8re communaut\xE9 islamique organis\xE9e." },
      { title: "La conqu\xEAte de La Mecque \u2014 le pardon universel", text: "En 630 EC, apr\xE8s 8 ans, Muhammad \uFDFA revint \xE0 La Mecque \xE0 la t\xEAte de 10 000 Compagnons. La ville se rendit sans combat. Devant ses anciens pers\xE9cuteurs, il dit ces mots m\xE9morables : 'Que vous dit-on que je vais faire de vous ?' Ils r\xE9pondirent : 'Du bien \u2014 tu es un fr\xE8re g\xE9n\xE9reux.' Il dit : 'Allez \u2014 vous \xEAtes libres !' Ce pardon total reste l'un des plus grands actes de l'histoire humaine." },
      { title: "Le Dernier Sermon et l'ach\xE8vement de la mission", text: "Lors du p\xE8lerinage d'adieu en 632 EC, le Proph\xE8te \uFDFA pronon\xE7a son c\xE9l\xE8bre discours devant 114 000 Compagnons. Il dit : 'Votre sang, vos biens et votre honneur sont sacr\xE9s. Vous compara\xEEtrez devant votre Seigneur. J'ai transmis le message \u2014 t\xE9moignez !' Quelques mois plus tard, il mourut \xE0 M\xE9dine \xE0 63 ans. Quelques mois plus tard, il mourut \xE0 M\xE9dine \xE0 63 ans. Les derni\xE8res paroles sur ses l\xE8vres \xE9taient : O peuple, aucun proph\xE8te ou ap\xF4tre ne viendra apr\xE8s moi, et aucune nouvelle foi ne na\xEEtra. Raisonnez donc bien, o peuple, et comprenez mes paroles que je vous transmets. Je laisse derri\xE8re moi deux choses, le Coran et ma Sunna et si vous les suivez, vous ne vous \xE9garez jamais." }
    ] }

    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0645\u064E\u0633\u064E\u0651\u0646\u0650\u064A\u064E \u0627\u0644\u0636\u064F\u0651\u0631\u064F\u0651 \u0648\u064E\u0623\u064E\u0646\u0652\u062A\u064E \u0623\u064E\u0631\u0652\u062D\u064E\u0645\u064F \u0627\u0644\u0631\u064E\u0651\u0627\u062D\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabbi inn\xEE massaniya ad-durru wa anta arhamur-r\xE2him\xEEn", fr: "Seigneur, l'adversit\xE9 m'a touch\xE9 et Tu es le plus Mis\xE9ricordieux \u2014 Dou'a d'Ayyub" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0644\u064E\u0627 \u062A\u064E\u0630\u064E\u0631\u0652\u0646\u0650\u064A \u0641\u064E\u0631\u0652\u062F\u064B\u0627 \u0648\u064E\u0623\u064E\u0646\u0652\u062A\u064E \u062E\u064E\u064A\u0652\u0631\u064F \u0627\u0644\u0648\u064E\u0627\u0631\u0650\u062B\u0650\u064A\u0646\u064E", ph: "Rabbi l\xE2 tadharni fardan wa anta khayrul-w\xE2rith\xEEn", fr: "Seigneur, ne me laisse pas seul sans descendance, Tu es le meilleur h\xE9ritier \u2014 Dou'a de Zakariyya" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0623\u064E\u0635\u0652\u0644\u0650\u062D\u0652 \u0644\u0650\u064A \u062F\u0650\u064A\u0646\u0650\u064A \u0627\u0644\u064E\u0651\u0630\u0650\u064A \u0647\u064F\u0648\u064E \u0639\u0650\u0635\u0652\u0645\u064E\u0629\u064F \u0623\u064E\u0645\u0652\u0631\u0650\u064A", ph: "All\xE2humma aslih l\xEE d\xEEn\xEE alladh\xEE huwa 'ismatu amr\xEE", fr: "\xD4 Allah, am\xE9liore pour moi ma religion qui est la sauvegarde de mes affaires" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u0650\u064A \u0648\u064E\u0627\u0631\u0652\u062D\u064E\u0645\u0652\u0646\u0650\u064A \u0648\u064E\u0627\u0647\u0652\u062F\u0650\u0646\u0650\u064A \u0648\u064E\u0627\u0631\u0652\u0632\u064F\u0642\u0652\u0646\u0650\u064A", ph: "All\xE2humma aghfir l\xEE warhamni wahdini warzuqn\xEE", fr: "\xD4 Allah, pardonne-moi, aie piti\xE9 de moi, guide-moi et accorde-moi Tes gr\xE2ces" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0644\u064E\u0627 \u062A\u064F\u0632\u0650\u063A\u0652 \u0642\u064F\u0644\u064F\u0648\u0628\u064E\u0646\u064E\u0627 \u0628\u064E\u0639\u0652\u062F\u064E \u0625\u0650\u0630\u0652 \u0647\u064E\u062F\u064E\u064A\u0652\u062A\u064E\u0646\u064E\u0627", ph: "Rabban\xE2 l\xE2 tuzigh qul\xFBban\xE2 ba'da idh hadaytan\xE2", fr: "Seigneur, ne laisse pas d\xE9vier nos c\u0153urs apr\xE8s que Tu nous as guid\xE9s" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0643\u064F\u0641\u0652\u0631\u0650 \u0648\u064E\u0627\u0644\u0641\u064E\u0642\u0652\u0631\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minal-kufri wal-faqr", fr: "\xD4 Allah, je cherche refuge en Toi contre la m\xE9cr\xE9ance et la pauvret\xE9" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0632\u0650\u062F\u0652\u0646\u0650\u064A \u0639\u0650\u0644\u0652\u0645\u064B\u0627", ph: "Rabbi zidn\xEE 'ilm\xE2", fr: "Seigneur, augmente mon savoir" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0639\u064E\u0627\u0641\u0650\u0646\u0650\u064A \u0641\u0650\u064A \u0628\u064E\u062F\u064E\u0646\u0650\u064A \u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0639\u064E\u0627\u0641\u0650\u0646\u0650\u064A \u0641\u0650\u064A \u0633\u064E\u0645\u0652\u0639\u0650\u064A", ph: "All\xE2humma '\xE2fin\xEE f\xEE badan\xEE, All\xE2humma '\xE2fin\xEE f\xEE sam'\xEE", fr: "\xD4 Allah, accorde-moi la sant\xE9 dans mon corps, \xF4 Allah, accorde-moi la sant\xE9 dans mon ou\xEFe" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u062C\u064E\u0646\u064E\u0651\u0629\u064E \u0648\u064E\u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0646\u064E\u0651\u0627\u0631\u0650", ph: "All\xE2humma inn\xEE as'alukal-jannata wa a'\xFBdhu bika minan-n\xE2r", fr: "\xD4 Allah, je Te demande le Paradis et je cherche refuge en Toi contre le Feu" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0623\u064E\u0646\u0652\u062A\u064E \u0627\u0644\u0633\u064E\u0651\u0644\u064E\u0627\u0645\u064F \u0648\u064E\u0645\u0650\u0646\u0652\u0643\u064E \u0627\u0644\u0633\u064E\u0651\u0644\u064E\u0627\u0645\u064F \u062A\u064E\u0628\u064E\u0627\u0631\u064E\u0643\u0652\u062A\u064E \u064A\u064E\u0627 \u0630\u064E\u0627 \u0627\u0644\u062C\u064E\u0644\u064E\u0627\u0644\u0650 \u0648\u064E\u0627\u0644\u0625\u0650\u0643\u0652\u0631\u064E\u0627\u0645\u0650", ph: "All\xE2humma antas-sal\xE2m wa minkas-sal\xE2m tab\xE2rakta y\xE2 dhal-jal\xE2li wal-ikr\xE2m", fr: "\xD4 Allah, Tu es la Paix et de Toi vient la Paix, b\xE9ni sois-Tu, \xF4 Ma\xEEtre de la Majest\xE9 et de la G\xE9n\xE9rosit\xE9" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0647\u064E\u0628\u0652 \u0644\u064E\u0646\u064E\u0627 \u0645\u0650\u0646\u0652 \u0623\u064E\u0632\u0652\u0648\u064E\u0627\u062C\u0650\u0646\u064E\u0627 \u0648\u064E\u0630\u064F\u0631\u0650\u0651\u064A\u064E\u0651\u0627\u062A\u0650\u0646\u064E\u0627 \u0642\u064F\u0631\u064E\u0651\u0629\u064E \u0623\u064E\u0639\u0652\u064A\u064F\u0646\u064D", ph: "Rabban\xE2 hab lan\xE2 min azw\xE2jin\xE2 wa dhurriyy\xE2tin\xE2 qurrata a'yunin", fr: "Seigneur, accorde-nous, de nos \xE9pouses et de nos enfants, la joie des yeux" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u0643\u0652\u0641\u0650\u0646\u0650\u064A \u0628\u0650\u062D\u064E\u0644\u064E\u0627\u0644\u0650\u0643\u064E \u0639\u064E\u0646\u0652 \u062D\u064E\u0631\u064E\u0627\u0645\u0650\u0643\u064E \u0648\u064E\u0623\u064E\u063A\u0652\u0646\u0650\u0646\u0650\u064A \u0628\u0650\u0641\u064E\u0636\u0652\u0644\u0650\u0643\u064E \u0639\u064E\u0645\u064E\u0651\u0646\u0652 \u0633\u0650\u0648\u064E\u0627\u0643\u064E", ph: "All\xE2humma akfin\xEE bihal\xE2lika 'an har\xE2mika wa aghnin\xEE bifadlika 'amman siw\xE2k", fr: "\xD4 Allah, fais-moi me suffire de ce qui est licite au lieu de l'illicite, et enrichis-moi par Ta gr\xE2ce de fa\xE7on \xE0 me rendre ind\xE9pendant de tout autre que Toi" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0645\u064F\u0635\u064E\u0631\u0650\u0651\u0641\u064E \u0627\u0644\u0642\u064F\u0644\u064F\u0648\u0628\u0650 \u0635\u064E\u0631\u0650\u0651\u0641\u0652 \u0642\u064F\u0644\u064F\u0648\u0628\u064E\u0646\u064E\u0627 \u0639\u064E\u0644\u064E\u0649 \u0637\u064E\u0627\u0639\u064E\u062A\u0650\u0643\u064E", ph: "All\xE2humma musarrifal-qul\xFBb sarrif qul\xFBban\xE2 'al\xE2 t\xE2'atik", fr: "\xD4 Allah, Toi qui fais tourner les c\u0153urs, fais tourner nos c\u0153urs vers l'ob\xE9issance \xE0 Toi" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627 \u0648\u064E\u0644\u0650\u0625\u0650\u062E\u0652\u0648\u064E\u0627\u0646\u0650\u0646\u064E\u0627 \u0627\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u0633\u064E\u0628\u064E\u0642\u064F\u0648\u0646\u064E\u0627 \u0628\u0650\u0627\u0644\u0625\u0650\u064A\u0645\u064E\u0627\u0646\u0650", ph: "Rabban\xE2 aghfir lan\xE2 wa li-ikhw\xE2nin\xE2 alladh\xEEna sabaq\xFBn\xE2 bil-\xEEm\xE2n", fr: "Seigneur, pardonne-nous ainsi qu'\xE0 nos fr\xE8res qui nous ont pr\xE9c\xE9d\xE9s dans la foi" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0639\u0650\u0644\u0652\u0645\u064B\u0627 \u0646\u064E\u0627\u0641\u0650\u0639\u064B\u0627 \u0648\u064E\u0631\u0650\u0632\u0652\u0642\u064B\u0627 \u0637\u064E\u064A\u0650\u0651\u0628\u064B\u0627 \u0648\u064E\u0639\u064E\u0645\u064E\u0644\u064B\u0627 \u0645\u064F\u062A\u064E\u0642\u064E\u0628\u064E\u0651\u0644\u064B\u0627", ph: "All\xE2humma inn\xEE as'aluka 'ilman n\xE2fi'an wa rizqan tayyiban wa 'amalan mutaqabbal\xE2", fr: "\xD4 Allah, je Te demande une science utile, une bonne subsistance et une action accept\xE9e" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0645\u064F\u0642\u0650\u064A\u0645\u064E \u0627\u0644\u0635\u064E\u0651\u0644\u064E\u0627\u0629\u0650 \u0648\u064E\u0645\u0650\u0646\u0652 \u0630\u064F\u0631\u0650\u0651\u064A\u064E\u0651\u062A\u0650\u064A", ph: "Rabbi aj'aln\xEE muq\xEEmas-sal\xE2ti wa min dhurriyyat\xEE", fr: "Seigneur, fais de moi quelqu'un qui accomplit la pri\xE8re ainsi que de ma descendance" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u0652 \u0634\u064E\u0631\u0650\u0651 \u0645\u064E\u0627 \u0639\u064E\u0645\u0650\u0644\u0652\u062A\u064F \u0648\u064E\u0645\u0650\u0646\u0652 \u0634\u064E\u0631\u0650\u0651 \u0645\u064E\u0627 \u0644\u064E\u0645\u0652 \u0623\u064E\u0639\u0652\u0645\u064E\u0644\u0652", ph: "All\xE2humma inn\xEE a'\xFBdhu bika min sharri m\xE2 'amiltu wa min sharri m\xE2 lam a'mal", fr: "\xD4 Allah, je cherche refuge en Toi contre le mal de ce que j'ai accompli et de ce que je n'ai pas encore accompli" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0638\u064E\u0644\u064E\u0645\u0652\u062A\u064F \u0646\u064E\u0641\u0652\u0633\u0650\u064A \u0638\u064F\u0644\u0652\u0645\u064B\u0627 \u0643\u064E\u062B\u0650\u064A\u0631\u064B\u0627 \u0648\u064E\u0644\u064E\u0627 \u064A\u064E\u063A\u0652\u0641\u0650\u0631\u064F \u0627\u0644\u0630\u064F\u0651\u0646\u064F\u0648\u0628\u064E \u0625\u0650\u0644\u064E\u0651\u0627 \u0623\u064E\u0646\u0652\u062A\u064E", ph: "All\xE2humma inn\xEE zalamtu nafs\xEE zulman kath\xEEran wa l\xE2 yaghfirudh-dhun\xFBba ill\xE2 ant", fr: "\xD4 Allah, j'ai commis beaucoup d'injustices envers moi-m\xEAme et nul ne pardonne les p\xE9ch\xE9s sinon Toi" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0644\u064E\u0627 \u062A\u064E\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0641\u0650\u062A\u0652\u0646\u064E\u0629\u064B \u0644\u0650\u0644\u0652\u0642\u064E\u0648\u0652\u0645\u0650 \u0627\u0644\u0638\u064E\u0651\u0627\u0644\u0650\u0645\u0650\u064A\u0646\u064E \u0648\u064E\u0646\u064E\u062C\u0650\u0651\u0646\u064E\u0627 \u0628\u0650\u0631\u064E\u062D\u0652\u0645\u064E\u062A\u0650\u0643\u064E", ph: "Rabban\xE2 l\xE2 taj'aln\xE2 fitnatan lil-qawmiz-z\xE2lim\xEEn wa najjin\xE2 birahmatik", fr: "Seigneur, ne fais pas de nous un objet d'\xE9preuve pour les injustes et sauve-nous par Ta mis\xE9ricorde" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0623\u064E\u062D\u0652\u0633\u0650\u0646\u0652 \u0639\u064E\u0627\u0642\u0650\u0628\u064E\u062A\u064E\u0646\u064E\u0627 \u0641\u0650\u064A \u0627\u0644\u0623\u064F\u0645\u064F\u0648\u0631\u0650 \u0643\u064F\u0644\u0650\u0651\u0647\u064E\u0627", ph: "All\xE2humma ahsin '\xE2qibatan\xE2 fil-um\xFBri kullih\xE2", fr: "\xD4 Allah, rends bonne notre fin dans toutes les affaires" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0622\u0645\u064E\u0646\u064E\u0651\u0627 \u0641\u064E\u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627 \u0648\u064E\u0627\u0631\u0652\u062D\u064E\u0645\u0652\u0646\u064E\u0627 \u0648\u064E\u0623\u064E\u0646\u0652\u062A\u064E \u062E\u064E\u064A\u0652\u0631\u064F \u0627\u0644\u0631\u064E\u0651\u0627\u062D\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabban\xE2 \xE2mann\xE2 faghfir lan\xE2 warhamna wa anta khayru ar-r\xE2him\xEEn", fr: "Seigneur, nous avons cru, pardonne-nous et aie piti\xE9 de nous, Tu es le meilleur des Mis\xE9ricordieux" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u062D\u064F\u0628\u064E\u0651\u0643\u064E \u0648\u064E\u062D\u064F\u0628\u064E\u0651 \u0645\u064E\u0646\u0652 \u064A\u064F\u062D\u0650\u0628\u064F\u0651\u0643\u064E", ph: "All\xE2humma inn\xEE as'aluka hubbaka wa hubba man yuhibbuk", fr: "\xD4 Allah, je Te demande Ton amour et l'amour de ceux qui T'aiment" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0623\u064E\u0639\u0650\u0646\u0650\u0651\u064A \u0648\u064E\u0644\u064E\u0627 \u062A\u064F\u0639\u0650\u0646\u0652 \u0639\u064E\u0644\u064E\u064A\u064E\u0651 \u0648\u064E\u0627\u0646\u0652\u0635\u064F\u0631\u0652\u0646\u0650\u064A \u0648\u064E\u0644\u064E\u0627 \u062A\u064E\u0646\u0652\u0635\u064F\u0631\u0652 \u0639\u064E\u0644\u064E\u064A\u064E\u0651", ph: "Rabbi a'inn\xEE wa l\xE2 tu'in 'alayya wansurn\xEE wa l\xE2 tansur 'alayy", fr: "Seigneur, aide-moi et n'aide pas contre moi, soutiens-moi et ne soutiens pas contre moi" },
