    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0623\u064E\u0644\u0650\u0651\u0641\u0652 \u0628\u064E\u064A\u0652\u0646\u064E \u0642\u064F\u0644\u064F\u0648\u0628\u0650\u0646\u064E\u0627 \u0648\u064E\u0623\u064E\u0635\u0652\u0644\u0650\u062D\u0652 \u0630\u064E\u0627\u062A\u064E \u0628\u064E\u064A\u0652\u0646\u0650\u0646\u064E\u0627", ph: "All\xE2humma allif bayna qul\xFBbin\xE2 wa aslih dh\xE2ta baynin\xE2", fr: "\xD4 Allah, unis nos c\u0153urs et am\xE9liore nos relations" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0623\u064E\u0641\u0652\u0631\u0650\u063A\u0652 \u0639\u064E\u0644\u064E\u064A\u0652\u0646\u064E\u0627 \u0635\u064E\u0628\u0652\u0631\u064B\u0627 \u0648\u064E\u062B\u064E\u0628\u0650\u0651\u062A\u0652 \u0623\u064E\u0642\u0652\u062F\u064E\u0627\u0645\u064E\u0646\u064E\u0627", ph: "Rabban\xE2 afrigh 'alayn\xE2 sabran wa thabbit aqd\xE2man\xE2", fr: "Seigneur, r\xE9pands sur nous la patience et affermis nos pas" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u062B\u064E\u0651\u0628\u064E\u0627\u062A\u064E \u0641\u0650\u064A \u0627\u0644\u0623\u064E\u0645\u0652\u0631\u0650 \u0648\u064E\u0627\u0644\u0639\u064E\u0632\u0650\u064A\u0645\u064E\u0629\u064E \u0639\u064E\u0644\u064E\u0649 \u0627\u0644\u0631\u064F\u0651\u0634\u0652\u062F\u0650", ph: "All\xE2humma inn\xEE as'alukat-thab\xE2ta fil-amri wal-'az\xEEmata 'alar-rushd", fr: "\xD4 Allah, je Te demande la fermet\xE9 dans les d\xE9cisions et la r\xE9solution dans la droiture" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u0623\u064E\u0648\u064E\u0651\u0644\u064E \u0647\u064E\u0630\u064E\u0627 \u0627\u0644\u0623\u064E\u0645\u0652\u0631\u0650 \u0635\u064E\u0644\u064E\u0627\u062D\u064B\u0627 \u0648\u064E\u0623\u064E\u0648\u0652\u0633\u064E\u0637\u064E\u0647\u064F \u0641\u064E\u0644\u064E\u0627\u062D\u064B\u0627 \u0648\u064E\u0622\u062E\u0650\u0631\u064E\u0647\u064F \u0646\u064E\u062C\u064E\u0627\u062D\u064B\u0627", ph: "All\xE2humma aj'al awwala h\xE2dhal-amri sal\xE2han wa awsatahu fal\xE2han wa \xE2khirahu naj\xE2h\xE2", fr: "\xD4 Allah, fais que le d\xE9but de cette affaire soit une rectitude, son milieu un succ\xE8s et sa fin une r\xE9ussite" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u0650\u064A \u0648\u064E\u062A\u064F\u0628\u0652 \u0639\u064E\u0644\u064E\u064A\u064E\u0651 \u0625\u0650\u0646\u064E\u0651\u0643\u064E \u0623\u064E\u0646\u0652\u062A\u064E \u0627\u0644\u062A\u064E\u0651\u0648\u064E\u0651\u0627\u0628\u064F \u0627\u0644\u063A\u064E\u0641\u064F\u0648\u0631\u064F", ph: "Rabbi aghfir l\xEE wa tub 'alayya innaka anta at-taww\xE2bul-ghaf\xFBr", fr: "Seigneur, pardonne-moi et reviens vers moi avec mis\xE9ricorde, Tu es le Grand Repentant, le Pardonneur" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u062E\u064E\u064A\u0652\u0631\u0650 \u0643\u064F\u0644\u0650\u0651\u0647\u0650 \u0639\u064E\u0627\u062C\u0650\u0644\u0650\u0647\u0650 \u0648\u064E\u0622\u062C\u0650\u0644\u0650\u0647\u0650", ph: "All\xE2humma inn\xEE as'aluka minal-khayri kullhi '\xE2jilihi wa \xE2jilih", fr: "\xD4 Allah, je Te demande tout le bien, imm\xE9diat et diff\xE9r\xE9" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u0635\u0652\u0631\u0650\u0641\u0652 \u0639\u064E\u0646\u064E\u0651\u0627 \u0639\u064E\u0630\u064E\u0627\u0628\u064E \u062C\u064E\u0647\u064E\u0646\u064E\u0651\u0645\u064E \u0625\u0650\u0646\u064E\u0651 \u0639\u064E\u0630\u064E\u0627\u0628\u064E\u0647\u064E\u0627 \u0643\u064E\u0627\u0646\u064E \u063A\u064E\u0631\u064E\u0627\u0645\u064B\u0627", ph: "Rabban\xE2 asrif 'ann\xE2 'adh\xE2ba jahannama inna 'adh\xE2bah\xE2 k\xE2na gharam\xE2", fr: "Seigneur, d\xE9tourne de nous le ch\xE2timent de la G\xE9henne, car son ch\xE2timent est in\xE9vitable" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0631\u0650\u0636\u064E\u0627\u0643\u064E \u0645\u0650\u0646\u0652 \u0633\u064E\u062E\u064E\u0637\u0650\u0643\u064E", ph: "All\xE2humma inn\xEE a'\xFBdhu birid\xE2ka min sakhatik", fr: "\xD4 Allah, je cherche refuge dans Ta satisfaction contre Ta col\xE8re" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627 \u0630\u064F\u0646\u064F\u0648\u0628\u064E\u0646\u064E\u0627 \u0648\u064E\u0625\u0650\u0633\u0652\u0631\u064E\u0627\u0641\u064E\u0646\u064E\u0627 \u0641\u0650\u064A \u0623\u064E\u0645\u0652\u0631\u0650\u0646\u064E\u0627", ph: "Rabban\xE2 aghfir lan\xE2 dhun\xFBban\xE2 wa isr\xE2fan\xE2 f\xEE amrin\xE2", fr: "Seigneur, pardonne-nous nos p\xE9ch\xE9s et nos exc\xE8s dans notre comportement" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u0647\u0652\u062F\u0650\u0646\u0650\u064A \u0641\u0650\u064A\u0645\u064E\u0646\u0652 \u0647\u064E\u062F\u064E\u064A\u0652\u062A\u064E", ph: "All\xE2humma ahdini f\xEEman hadayt", fr: "\xD4 Allah, guide-moi parmi ceux que Tu as guid\xE9s" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0623\u064E\u062F\u0652\u062E\u0650\u0644\u0652\u0646\u0650\u064A \u0645\u064F\u062F\u0652\u062E\u064E\u0644\u064E \u0635\u0650\u062F\u0652\u0642\u064D \u0648\u064E\u0623\u064E\u062E\u0652\u0631\u0650\u062C\u0652\u0646\u0650\u064A \u0645\u064F\u062E\u0652\u0631\u064E\u062C\u064E \u0635\u0650\u062F\u0652\u0642\u064D", ph: "Rabbi adkhiln\xEE mudkhala sidqin wa akhrijn\xEE mukhraja sidqin", fr: "Seigneur, fais-moi entrer d'une entr\xE9e sinc\xE8re et sortir d'une sortie sinc\xE8re" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0645\u0650\u0646\u064E \u0627\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u0625\u0650\u0630\u064E\u0627 \u0623\u064E\u062D\u0652\u0633\u064E\u0646\u064F\u0648\u0627 \u0627\u0633\u0652\u062A\u064E\u0628\u0652\u0634\u064E\u0631\u064F\u0648\u0627", ph: "All\xE2humma aj'aln\xEE minal-ladh\xEEna idh\xE2 ahsan\xFB istabshar\xFB", fr: "\xD4 Allah, fais de moi ceux qui, lorsqu'ils font le bien, en sont joyeux" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0644\u064E\u0627 \u062A\u064F\u0624\u064E\u0627\u062E\u0650\u0630\u0652\u0646\u064E\u0627 \u0625\u0650\u0646\u0652 \u0646\u064E\u0633\u0650\u064A\u0646\u064E\u0627 \u0623\u064E\u0648\u0652 \u0623\u064E\u062E\u0652\u0637\u064E\u0623\u0652\u0646\u064E\u0627", ph: "Rabban\xE2 l\xE2 tu'\xE2khidhn\xE2 in nas\xEEn\xE2 aw akhta'n\xE2", fr: "Seigneur, ne nous sanctionne pas si nous oublions ou si nous faisons une erreur" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0642\u0650\u0646\u0650\u064A \u0639\u064E\u0630\u064E\u0627\u0628\u064E\u0643\u064E \u064A\u064E\u0648\u0652\u0645\u064E \u062A\u064E\u0628\u0652\u0639\u064E\u062B\u064F \u0639\u0650\u0628\u064E\u0627\u062F\u064E\u0643\u064E", ph: "All\xE2humma qin\xEE 'adh\xE2baka yawma tab'athu 'ib\xE2dak", fr: "\xD4 Allah, pr\xE9serve-moi de Ton ch\xE2timent le Jour o\xF9 Tu ressusciteras Tes serviteurs" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u0647\u064E\u0630\u064E\u0627 \u0627\u0644\u0628\u064E\u0644\u064E\u062F\u064E \u0622\u0645\u0650\u0646\u064B\u0627 \u0648\u064E\u0627\u062C\u0652\u0646\u064F\u0628\u0652\u0646\u0650\u064A \u0648\u064E\u0628\u064E\u0646\u0650\u064A\u064E\u0651 \u0623\u064E\u0646\u0652 \u0646\u064E\u0639\u0652\u0628\u064F\u062F\u064E \u0627\u0644\u0623\u064E\u0635\u0652\u0646\u064E\u0627\u0645\u064E", ph: "Rabbi aj'al h\xE2dhal-balada \xE2minan wajnubn\xEE wa baniyya an na'budal-asn\xE2m", fr: "Seigneur, rends cette cit\xE9 s\xFBre et pr\xE9serve-moi, moi et mes enfants, d'adorer les idoles" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0628\u064E\u0627\u0631\u0650\u0643\u0652 \u0644\u064E\u0646\u064E\u0627 \u0641\u0650\u064A \u0631\u064E\u062C\u064E\u0628\u064E \u0648\u064E\u0634\u064E\u0639\u0652\u0628\u064E\u0627\u0646\u064E \u0648\u064E\u0628\u064E\u0644\u0650\u0651\u063A\u0652\u0646\u064E\u0627 \u0631\u064E\u0645\u064E\u0636\u064E\u0627\u0646\u064E", ph: "All\xE2humma b\xE2rik lan\xE2 f\xEE Rajaba wa Sha'b\xE2na wa ballighn\xE2 Ramad\xE2n", fr: "\xD4 Allah, b\xE9nis-nous dans Rajab et Sha'b\xE2n, et fais-nous parvenir au Ramadan" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0622\u062A\u0650\u0646\u064E\u0627 \u0645\u0650\u0646\u0652 \u0644\u064E\u062F\u064F\u0646\u0652\u0643\u064E \u0631\u064E\u062D\u0652\u0645\u064E\u0629\u064B \u0648\u064E\u0647\u064E\u064A\u0650\u0651\u0626\u0652 \u0644\u064E\u0646\u064E\u0627 \u0645\u0650\u0646\u0652 \u0623\u064E\u0645\u0652\u0631\u0650\u0646\u064E\u0627 \u0631\u064E\u0634\u064E\u062F\u064B\u0627", ph: "Rabban\xE2 \xE2tin\xE2 min ladunka rahmatan wa hayyi' lan\xE2 min amrin\xE2 rashad\xE2", fr: "Seigneur, accorde-nous de Ta part mis\xE9ricorde et dispose pour nous nos affaires dans la droiture" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0628\u064F\u062E\u0652\u0644\u0650 \u0648\u064E\u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u062C\u064F\u0628\u0652\u0646\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minal-bukhli wa a'\xFBdhu bika minal-jubn", fr: "\xD4 Allah, je cherche refuge en Toi contre l'avarice et contre la l\xE2chet\xE9" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0648\u064E\u0627\u0631\u0652\u062D\u064E\u0645\u0652 \u0648\u064E\u0623\u064E\u0646\u0652\u062A\u064E \u062E\u064E\u064A\u0652\u0631\u064F \u0627\u0644\u0631\u064E\u0651\u0627\u062D\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabbi aghfir warham wa anta khayru ar-r\xE2him\xEEn", fr: "Seigneur, pardonne et aie piti\xE9, Tu es le meilleur des Mis\xE9ricordieux" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u0631\u0650\u0651\u0636\u064E\u0627 \u0628\u064E\u0639\u0652\u062F\u064E \u0627\u0644\u0642\u064E\u0636\u064E\u0627\u0621\u0650", ph: "All\xE2humma inn\xEE as'alukar-rid\xE2 ba'dal-qad\xE2'", fr: "\xD4 Allah, je Te demande l'agr\xE9ment apr\xE8s le jugement divin" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u0650\u064A \u0648\u064E\u0644\u0650\u0648\u064E\u0627\u0644\u0650\u062F\u064E\u064A\u064E\u0651 \u0648\u064E\u0644\u0650\u0644\u0652\u0645\u064F\u0624\u0652\u0645\u0650\u0646\u0650\u064A\u0646\u064E \u064A\u064E\u0648\u0652\u0645\u064E \u064A\u064E\u0642\u064F\u0648\u0645\u064F \u0627\u0644\u062D\u0650\u0633\u064E\u0627\u0628\u064F", ph: "Rabban\xE2 aghfir l\xEE wa liw\xE2lidayya wa lil-mu'min\xEEna yawma yaq\xFBmul-his\xE2b", fr: "Seigneur, pardonne-moi ainsi qu'\xE0 mes parents et aux croyants le Jour o\xF9 aura lieu le Jugement" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0641\u064E\u0648\u064E\u0627\u062A\u0650\u062D\u064E \u0627\u0644\u062E\u064E\u064A\u0652\u0631\u0650 \u0648\u064E\u062E\u064E\u0648\u064E\u0627\u062A\u0650\u0645\u064E\u0647\u064F", ph: "All\xE2humma inn\xEE as'aluka faw\xE2tihul-khayri wa khaw\xE2timah", fr: "\xD4 Allah, je Te demande les d\xE9buts et les fins du bien" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u0652 \u0647\u064E\u0645\u064E\u0632\u064E\u0627\u062A\u0650 \u0627\u0644\u0634\u064E\u0651\u064A\u064E\u0627\u0637\u0650\u064A\u0646\u0650", ph: "Rabbi a'\xFBdhu bika min hamaz\xE2tish-shay\xE2t\xEEn", fr: "Seigneur, je cherche refuge en Toi contre les suggestions des d\xE9mons" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u062E\u064E\u064A\u0652\u0631\u064E \u0639\u064F\u0645\u064F\u0631\u0650\u064A \u0622\u062E\u0650\u0631\u064E\u0647\u064F \u0648\u064E\u062E\u064E\u064A\u0652\u0631\u064E \u0623\u064E\u0639\u0652\u0645\u064E\u0627\u0644\u0650\u064A \u062E\u064E\u0648\u064E\u0627\u062A\u0650\u0645\u064E\u0647\u064E\u0627", ph: "All\xE2humma aj'al khayra 'umur\xEE \xE2khirah wa khayra a'm\xE2l\xEE khaw\xE2timah\xE2", fr: "\xD4 Allah, fais que le meilleur de ma vie soit sa fin et le meilleur de mes \u0153uvres leur conclusion" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0648\u064E\u0644\u064E\u0627 \u062A\u064F\u062D\u064E\u0645\u0650\u0651\u0644\u0652\u0646\u064E\u0627 \u0645\u064E\u0627 \u0644\u064E\u0627 \u0637\u064E\u0627\u0642\u064E\u0629\u064E \u0644\u064E\u0646\u064E\u0627 \u0628\u0650\u0647\u0650 \u0648\u064E\u0627\u0639\u0652\u0641\u064F \u0639\u064E\u0646\u064E\u0651\u0627", ph: "Rabban\xE2 wa l\xE2 tuhammiln\xE2 m\xE2 l\xE2 t\xE2qata lan\xE2 bihi wa'fu 'ann\xE2", fr: "Seigneur, ne nous charge pas de ce que nous n'avons pas la force de porter et pardonne-nous" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0641\u0650\u0639\u0652\u0644\u064E \u0627\u0644\u062E\u064E\u064A\u0652\u0631\u064E\u0627\u062A\u0650 \u0648\u064E\u062A\u064E\u0631\u0652\u0643\u064E \u0627\u0644\u0645\u064F\u0646\u0652\u0643\u064E\u0631\u064E\u0627\u062A\u0650", ph: "All\xE2humma inn\xEE as'aluka fi'lal-khayr\xE2ti wa tarkal-munkar\xE2t", fr: "\xD4 Allah, je Te demande d'accomplir les bonnes \u0153uvres et d'abandonner les actes r\xE9pr\xE9hensibles" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0645\u064E\u0627 \u062E\u064E\u0644\u064E\u0642\u0652\u062A\u064E \u0647\u064E\u0630\u064E\u0627 \u0628\u064E\u0627\u0637\u0650\u0644\u064B\u0627 \u0633\u064F\u0628\u0652\u062D\u064E\u0627\u0646\u064E\u0643\u064E \u0641\u064E\u0642\u0650\u0646\u064E\u0627 \u0639\u064E\u0630\u064E\u0627\u0628\u064E \u0627\u0644\u0646\u064E\u0651\u0627\u0631\u0650", ph: "Rabban\xE2 m\xE2 khalaqta h\xE2dh\xE2 b\xE2tilan subh\xE2naka faqin\xE2 'adh\xE2ban-n\xE2r", fr: "Seigneur, Tu n'as pas cr\xE9\xE9 cela en vain, gloire \xE0 Toi, pr\xE9serve-nous du ch\xE2timent du Feu" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0644\u064E\u0643\u064E \u0634\u064E\u0627\u0643\u0650\u0631\u064B\u0627 \u0644\u064E\u0643\u064E \u0630\u064E\u0627\u0643\u0650\u0631\u064B\u0627 \u0644\u064E\u0643\u064E \u0631\u064E\u0627\u0647\u0650\u0628\u064B\u0627", ph: "All\xE2humma aj'aln\xEE laka sh\xE2kiran laka dh\xE2kiran laka r\xE2hiban", fr: "\xD4 Allah, fais de moi quelqu'un qui Te remercie, qui Te mentionne et qui Te craint" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0647\u064E\u0628\u0652 \u0644\u0650\u064A \u062D\u064F\u0643\u0652\u0645\u064B\u0627 \u0648\u064E\u0623\u064E\u0644\u0652\u062D\u0650\u0642\u0652\u0646\u0650\u064A \u0628\u0650\u0627\u0644\u0635\u064E\u0651\u0627\u0644\u0650\u062D\u0650\u064A\u0646\u064E", ph: "Rabbi hab l\xEE hukman wa alhiqn\xEE bis-s\xE2lih\xEEn", fr: "Seigneur, accorde-moi la sagesse et joins-moi aux vertueux \u2014 Dou'a d'Ibrahim" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u062E\u064E\u0634\u0652\u064A\u064E\u062A\u064E\u0643\u064E \u0641\u0650\u064A \u0627\u0644\u063A\u064E\u064A\u0652\u0628\u0650 \u0648\u064E\u0627\u0644\u0634\u064E\u0651\u0647\u064E\u0627\u062F\u064E\u0629\u0650", ph: "All\xE2humma inn\xEE as'aluka khashyataka fil-ghaybi wash-shah\xE2dah", fr: "\xD4 Allah, je Te demande Ta crainte en secret et en public" },
    // MARS (60-90)
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u0643\u0652\u0634\u0650\u0641\u0652 \u0639\u064E\u0646\u064E\u0651\u0627 \u0627\u0644\u0639\u064E\u0630\u064E\u0627\u0628\u064E \u0625\u0650\u0646\u064E\u0651\u0627 \u0645\u064F\u0624\u0652\u0645\u0650\u0646\u064F\u0648\u0646\u064E", ph: "Rabban\xE2 akshif 'annal-'adh\xE2ba inn\xE2 mu'min\xFBn", fr: "Seigneur, \xE9carte de nous le ch\xE2timent, car nous sommes croyants" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u063A\u064E\u0641\u0652\u0644\u064E\u0629\u0650 \u0648\u064E\u0627\u0644\u0642\u064E\u0633\u0652\u0648\u064E\u0629\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minal-ghaflati wal-qaswah", fr: "\xD4 Allah, je cherche refuge en Toi contre la n\xE9gligence et la duret\xE9 de c\u0153ur" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0623\u064E\u0648\u0652\u0632\u0650\u0639\u0652\u0646\u0650\u064A \u0623\u064E\u0646\u0652 \u0623\u064E\u0634\u0652\u0643\u064F\u0631\u064E \u0646\u0650\u0639\u0652\u0645\u064E\u062A\u064E\u0643\u064E \u0627\u0644\u064E\u0651\u062A\u0650\u064A \u0623\u064E\u0646\u0652\u0639\u064E\u0645\u0652\u062A\u064E \u0639\u064E\u0644\u064E\u064A\u064E\u0651", ph: "Rabbi awzi'n\xEE an ashkura ni'matakal-lat\xEE an'amta 'alayya", fr: "Seigneur, inspire-moi de reconna\xEEtre Ta gr\xE2ce que Tu as accord\xE9e \xE0 moi" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u062B\u064E\u0628\u0650\u0651\u062A\u0652 \u0642\u064E\u0644\u0652\u0628\u0650\u064A \u0639\u064E\u0644\u064E\u0649 \u062F\u0650\u064A\u0646\u0650\u0643\u064E", ph: "All\xE2humma thabbit qalb\xEE 'al\xE2 d\xEEnik", fr: "\xD4 Allah, affermis mon c\u0153ur sur Ta religion" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0625\u0650\u0646\u064E\u0651\u0643\u064E \u062C\u064E\u0627\u0645\u0650\u0639\u064F \u0627\u0644\u0646\u064E\u0651\u0627\u0633\u0650 \u0644\u0650\u064A\u064E\u0648\u0652\u0645\u064D \u0644\u064E\u0627 \u0631\u064E\u064A\u0652\u0628\u064E \u0641\u0650\u064A\u0647\u0650", ph: "Rabban\xE2 innaka j\xE2mi'un-n\xE2si li-yawmin l\xE2 rayba f\xEEh", fr: "Seigneur, Tu rassembleras les hommes en un Jour sur lequel il n'y a aucun doute" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0635\u0650\u062D\u064E\u0651\u0629\u064B \u0641\u0650\u064A \u0625\u0650\u064A\u0645\u064E\u0627\u0646\u064D \u0648\u064E\u0625\u0650\u064A\u0645\u064E\u0627\u0646\u064B\u0627 \u0641\u0650\u064A \u062D\u064F\u0633\u0652\u0646\u0650 \u062E\u064F\u0644\u064F\u0642\u064D", ph: "All\xE2humma inn\xEE as'aluka sihhatan f\xEE \xEEm\xE2nin wa \xEEm\xE2nan f\xEE husni khuluq", fr: "\xD4 Allah, je Te demande la sant\xE9 avec la foi et la foi avec un bon caract\xE8re" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0644\u064E\u0627 \u062A\u064E\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0641\u0650\u064A \u0627\u0644\u0642\u064E\u0648\u0652\u0645\u0650 \u0627\u0644\u0638\u064E\u0651\u0627\u0644\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabbi l\xE2 taj'aln\xEE fil-qawmiz-z\xE2lim\xEEn", fr: "Seigneur, ne me place pas parmi les injustes" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u0623\u064E\u062D\u064E\u0628\u064E\u0651 \u0627\u0644\u0623\u064E\u0639\u0652\u0645\u064E\u0627\u0644\u0650 \u0625\u0650\u0644\u064E\u064A\u064E\u0651 \u0627\u0644\u0635\u064E\u0651\u0644\u064E\u0627\u0629\u064E", ph: "All\xE2humma aj'al ahabbal-a'm\xE2li ilayya as-sal\xE2t", fr: "\xD4 Allah, fais que la pri\xE8re soit l'acte le plus aim\xE9 de moi" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0644\u064E\u0627 \u062A\u064E\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0645\u064E\u0639\u064E \u0627\u0644\u0642\u064E\u0648\u0652\u0645\u0650 \u0627\u0644\u0638\u064E\u0651\u0627\u0644\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabban\xE2 l\xE2 taj'aln\xE2 ma'al-qawmiz-z\xE2lim\xEEn", fr: "Seigneur, ne nous mets pas avec les gens injustes" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0623\u064E\u0646\u0652 \u062A\u064E\u062C\u0652\u0639\u064E\u0644\u064E\u0646\u0650\u064A \u0645\u0650\u0645\u064E\u0651\u0646\u0652 \u062A\u064E\u0648\u064E\u0643\u064E\u0651\u0644\u064E \u0639\u064E\u0644\u064E\u064A\u0652\u0643\u064E", ph: "All\xE2humma inn\xEE as'aluka an taj'alan\xEE mimman tawakkala 'alayk", fr: "\xD4 Allah, je Te demande de me faire partie de ceux qui se confient enti\xE8rement \xE0 Toi" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0647\u064E\u0628\u0652 \u0644\u0650\u064A \u0645\u0650\u0646\u064E \u0627\u0644\u0635\u064E\u0651\u0627\u0644\u0650\u062D\u0650\u064A\u0646\u064E", ph: "Rabbi hab l\xEE minas-s\xE2lih\xEEn", fr: "Seigneur, accorde-moi [une descendance] parmi les vertueux \u2014 Dou'a d'Ibrahim" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u064A\u064E\u0633\u0650\u0651\u0631\u0652 \u0648\u064E\u0644\u064E\u0627 \u062A\u064F\u0639\u064E\u0633\u0650\u0651\u0631\u0652 \u0648\u064E\u062A\u064E\u0645\u0650\u0651\u0645\u0652 \u0628\u0650\u0627\u0644\u062E\u064E\u064A\u0652\u0631\u0650", ph: "All\xE2humma yassir wa l\xE2 tu'assir wa tammim bil-khayr", fr: "\xD4 Allah, facilite et ne complique pas, et conclus par le bien" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0644\u064E\u0627 \u062A\u064F\u0624\u064E\u0627\u062E\u0650\u0630\u0652\u0646\u064E\u0627 \u0628\u0650\u0645\u064E\u0627 \u0641\u064E\u0639\u064E\u0644\u064E \u0627\u0644\u0633\u064F\u0651\u0641\u064E\u0647\u064E\u0627\u0621\u064F \u0645\u0650\u0646\u064E\u0651\u0627", ph: "Rabban\xE2 l\xE2 tu'\xE2khidhn\xE2 bim\xE2 fa'alas-sufah\xE2'u minn\xE2", fr: "Seigneur, ne nous tiens pas responsables de ce qu'ont fait les insens\xE9s d'entre nous" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u062D\u064F\u0633\u0652\u0646\u064E \u0627\u0644\u062E\u064E\u0627\u062A\u0650\u0645\u064E\u0629\u0650", ph: "All\xE2humma inn\xEE as'aluka husnal-kh\xE2timah", fr: "\xD4 Allah, je Te demande une bonne fin" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0623\u064E\u062F\u0652\u062E\u0650\u0644\u0652\u0646\u0650\u064A \u0641\u0650\u064A \u0631\u064E\u062D\u0652\u0645\u064E\u062A\u0650\u0643\u064E \u0648\u064E\u0623\u064E\u0646\u0652\u062A\u064E \u0623\u064E\u0631\u0652\u062D\u064E\u0645\u064F \u0627\u0644\u0631\u064E\u0651\u0627\u062D\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabbi adkhiln\xEE f\xEE rahmatika wa anta arhamur-r\xE2him\xEEn", fr: "Seigneur, fais-moi entrer dans Ta mis\xE9ricorde, Tu es le plus Mis\xE9ricordieux" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u062C\u064E\u0646\u064E\u0651\u0629\u064E \u0648\u064E\u0645\u064E\u0627 \u0642\u064E\u0631\u064E\u0651\u0628\u064E \u0625\u0650\u0644\u064E\u064A\u0652\u0647\u064E\u0627 \u0645\u0650\u0646\u0652 \u0642\u064E\u0648\u0652\u0644\u064D \u0648\u064E\u0639\u064E\u0645\u064E\u0644\u064D", ph: "All\xE2humma inn\xEE as'alukal-jannata wa m\xE2 qarraba ilayh\xE2 min qawlin wa 'amal", fr: "\xD4 Allah, je Te demande le Paradis et ce qui s'en approche comme paroles et actes" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627 \u0648\u064E\u0644\u0650\u0622\u0628\u064E\u0627\u0626\u0650\u0646\u064E\u0627 \u0648\u064E\u0644\u0650\u0623\u064F\u0645\u064E\u0651\u0647\u064E\u0627\u062A\u0650\u0646\u064E\u0627", ph: "Rabban\xE2 aghfir lan\xE2 wa li-\xE2b\xE2'in\xE2 wa li-ummah\xE2tin\xE2", fr: "Seigneur, pardonne-nous ainsi qu'\xE0 nos p\xE8res et \xE0 nos m\xE8res" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u0652 \u0633\u064F\u0648\u0621\u0650 \u0627\u0644\u062E\u064F\u0644\u064F\u0642\u0650 \u0648\u064E\u0627\u0644\u0639\u064E\u0645\u064E\u0644\u0650 \u0648\u064E\u0627\u0644\u0647\u064E\u0648\u064E\u0649", ph: "All\xE2humma inn\xEE a'\xFBdhu bika min s\xFB'il-khuluqi wal-'amali wal-haw\xE2", fr: "\xD4 Allah, je cherche refuge en Toi contre le mauvais caract\xE8re, les mauvaises actions et les d\xE9sirs" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0645\u064F\u0642\u0650\u064A\u0645\u064E \u0627\u0644\u0635\u064E\u0651\u0644\u064E\u0627\u0629\u0650 \u0648\u064E\u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0645\u0650\u0646\u0652 \u0623\u064E\u0647\u0652\u0644\u0650 \u0627\u0644\u062C\u064E\u0646\u064E\u0651\u0629\u0650", ph: "Rabbi aj'aln\xEE muq\xEEmas-sal\xE2ti waj'aln\xEE min ahlil-jannah", fr: "Seigneur, fais de moi quelqu'un qui accomplit la pri\xE8re et fais de moi parmi les habitants du Paradis" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0623\u064E\u0639\u0650\u0646\u0650\u0651\u064A \u0639\u064E\u0644\u064E\u0649 \u0630\u0650\u0643\u0652\u0631\u0650\u0643\u064E \u0648\u064E\u0634\u064F\u0643\u0652\u0631\u0650\u0643\u064E \u0648\u064E\u062D\u064F\u0633\u0652\u0646\u0650 \u0639\u0650\u0628\u064E\u0627\u062F\u064E\u062A\u0650\u0643\u064E", ph: "All\xE2humma a'inn\xEE 'al\xE2 dhikrika wa shukrika wa husni 'ib\xE2datik", fr: "\xD4 Allah, aide-moi \xE0 Te mentionner, \xE0 Te remercier et \xE0 T'adorer de la meilleure fa\xE7on" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0622\u062A\u0650\u0646\u064E\u0627 \u0645\u0650\u0646\u064E \u0627\u0644\u0635\u064E\u0651\u0627\u0644\u0650\u062D\u064E\u0627\u062A\u0650 \u0648\u064E\u062A\u064F\u0628\u0652 \u0639\u064E\u0644\u064E\u064A\u0652\u0646\u064E\u0627", ph: "Rabban\xE2 \xE2tin\xE2 minas-s\xE2lih\xE2ti wa tub 'alayn\xE2", fr: "Seigneur, accorde-nous les bonnes choses et reviens vers nous avec mis\xE9ricorde" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0643\u064E\u0633\u064E\u0644\u0650 \u0648\u064E\u0627\u0644\u0647\u064E\u0631\u064E\u0645\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minal-kasali wal-haram", fr: "\xD4 Allah, je cherche refuge en Toi contre la paresse et la d\xE9cr\xE9pitude" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0648\u064E\u0630\u064F\u0631\u0650\u0651\u064A\u064E\u0651\u062A\u0650\u064A \u0645\u0650\u0646\u064E \u0627\u0644\u0645\u064F\u0633\u0652\u0644\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabbi aj'aln\xEE wa dhurriyyat\xEE minal-muslim\xEEn", fr: "Seigneur, fais de moi et de ma descendance des musulmans soumis \xE0 Toi" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u0639\u064E\u0627\u0641\u0650\u064A\u064E\u0629\u064E \u0641\u0650\u064A \u0627\u0644\u062F\u064F\u0651\u0646\u0652\u064A\u064E\u0627 \u0648\u064E\u0627\u0644\u0622\u062E\u0650\u0631\u064E\u0629\u0650", ph: "All\xE2humma inn\xEE as'alukal-'\xE2fiyata fid-duny\xE2 wal-\xE2khirah", fr: "\xD4 Allah, je Te demande la sant\xE9 et le salut dans ce monde et dans l'au-del\xE0" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0625\u0650\u0646\u064E\u0651\u0646\u064E\u0627 \u0633\u064E\u0645\u0650\u0639\u0652\u0646\u064E\u0627 \u0645\u064F\u0646\u064E\u0627\u062F\u0650\u064A\u064B\u0627 \u064A\u064F\u0646\u064E\u0627\u062F\u0650\u064A \u0644\u0650\u0644\u0625\u0650\u064A\u0645\u064E\u0627\u0646\u0650 \u0641\u064E\u0622\u0645\u064E\u0646\u064E\u0651\u0627", ph: "Rabban\xE2 innan\xE2 sami'n\xE2 mun\xE2diyan yun\xE2d\xEE lil-\xEEm\xE2ni fa-\xE2mann\xE2", fr: "Seigneur, nous avons entendu un appelant qui appelait \xE0 la foi, et nous avons cru" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u0646\u064F\u0651\u0648\u0631\u064E \u0641\u0650\u064A \u0642\u064E\u0628\u0652\u0631\u0650\u064A \u0648\u064E\u0627\u0644\u0646\u064F\u0651\u0648\u0631\u064E \u0641\u0650\u064A \u0642\u064E\u0644\u0652\u0628\u0650\u064A", ph: "All\xE2humma inn\xEE as'alukal-n\xFBra f\xEE qabr\xEE wan-n\xFBra f\xEE qalb\xEE", fr: "\xD4 Allah, je Te demande la lumi\xE8re dans ma tombe et la lumi\xE8re dans mon c\u0153ur" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u0647\u064E\u0630\u064E\u0627 \u0627\u0644\u0628\u064E\u0644\u064E\u062F\u064E \u0622\u0645\u0650\u0646\u064B\u0627 \u0648\u064E\u0627\u0631\u0652\u0632\u064F\u0642\u0652 \u0623\u064E\u0647\u0652\u0644\u064E\u0647\u064F \u0645\u0650\u0646\u064E \u0627\u0644\u062B\u064E\u0651\u0645\u064E\u0631\u064E\u0627\u062A\u0650", ph: "Rabbi aj'al h\xE2dhal-balada \xE2minan warzuq ahlahu minas-thamar\xE2t", fr: "Seigneur, rends cette cit\xE9 s\xFBre et accorde \xE0 ses habitants des fruits comme subsistance" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u062E\u064E\u064A\u0652\u0631\u064E \u0647\u064E\u0630\u064E\u0627 \u0627\u0644\u064A\u064E\u0648\u0652\u0645\u0650 \u0648\u064E\u062E\u064E\u064A\u0652\u0631\u064E \u0645\u064E\u0627 \u0641\u0650\u064A\u0647\u0650", ph: "All\xE2humma inn\xEE as'aluka khayra h\xE2dhal-yawmi wa khayra m\xE2 f\xEEh", fr: "\xD4 Allah, je Te demande le bien de ce jour et le bien de ce qu'il contient" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0623\u064E\u062A\u0652\u0645\u0650\u0645\u0652 \u0644\u064E\u0646\u064E\u0627 \u0646\u064F\u0648\u0631\u064E\u0646\u064E\u0627 \u0648\u064E\u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627", ph: "Rabban\xE2 atmim lan\xE2 n\xFBran\xE2 waghfir lan\xE2", fr: "Seigneur, parfais notre lumi\xE8re et pardonne-nous" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0628\u0650\u0643\u064E \u0623\u064E\u0635\u0652\u0628\u064E\u062D\u0652\u0646\u064E\u0627 \u0648\u064E\u0628\u0650\u0643\u064E \u0623\u064E\u0645\u0652\u0633\u064E\u064A\u0652\u0646\u064E\u0627 \u0648\u064E\u0628\u0650\u0643\u064E \u0646\u064E\u062D\u0652\u064A\u064E\u0627 \u0648\u064E\u0628\u0650\u0643\u064E \u0646\u064E\u0645\u064F\u0648\u062A\u064F", ph: "All\xE2humma bika asbahna wa bika amsayn\xE2 wa bika nahy\xE2 wa bika nam\xFBt", fr: "\xD4 Allah, c'est par Toi que nous commen\xE7ons le matin, par Toi que nous commen\xE7ons le soir, par Toi que nous vivons et par Toi que nous mourons" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0644\u0650\u0645\u064E\u0627 \u0623\u064E\u0646\u0652\u0632\u064E\u0644\u0652\u062A\u064E \u0625\u0650\u0644\u064E\u064A\u064E\u0651 \u0645\u0650\u0646\u0652 \u062E\u064E\u064A\u0652\u0631\u064D \u0641\u064E\u0642\u0650\u064A\u0631\u064C", ph: "Rabbi inn\xEE lim\xE2 anzalta ilayya min khayrin faq\xEEr", fr: "Seigneur, j'ai bien besoin du bien que Tu fais descendre vers moi \u2014 Dou'a de M\xFBsa" },
    // AVRIL à DÉCEMBRE \u2014 continuez avec des dou'as variées
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0647\u064F\u062F\u064E\u0627\u0629\u064B \u0645\u064F\u0647\u0652\u062A\u064E\u062F\u0650\u064A\u0646\u064E", ph: "All\xE2humma aj'aln\xE2 hud\xE2tan muhtad\xEEn", fr: "\xD4 Allah, fais de nous des guides bien guid\xE9s" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0645\u064F\u0633\u0652\u0644\u0650\u0645\u064E\u064A\u0652\u0646\u0650 \u0644\u064E\u0643\u064E \u0648\u064E\u0645\u0650\u0646\u0652 \u0630\u064F\u0631\u0650\u0651\u064A\u064E\u0651\u062A\u0650\u0646\u064E\u0627 \u0623\u064F\u0645\u064E\u0651\u0629\u064B \u0645\u064F\u0633\u0652\u0644\u0650\u0645\u064E\u0629\u064B \u0644\u064E\u0643\u064E", ph: "Rabban\xE2 aj'aln\xE2 muslimayni laka wa min dhurriyyatin\xE2 ummatan muslimatan lak", fr: "Seigneur, fais de nous deux des soumis \xE0 Toi et de notre descendance une communaut\xE9 soumise \u2014 Dou'a d'Ibrahim" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0645\u0650\u0646\u0652 \u0641\u064E\u0636\u0652\u0644\u0650\u0643\u064E \u0648\u064E\u0631\u064E\u062D\u0652\u0645\u064E\u062A\u0650\u0643\u064E", ph: "All\xE2humma inn\xEE as'aluka min fadlika wa rahmatik", fr: "\xD4 Allah, je Te demande de Ta gr\xE2ce et de Ta mis\xE9ricorde" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0648\u064E\u0627\u0628\u0652\u0639\u064E\u062B\u0652 \u0641\u0650\u064A\u0647\u0650\u0645\u0652 \u0631\u064E\u0633\u064F\u0648\u0644\u064B\u0627 \u0645\u0650\u0646\u0652\u0647\u064F\u0645\u0652 \u064A\u064E\u062A\u0652\u0644\u064F\u0648 \u0639\u064E\u0644\u064E\u064A\u0652\u0647\u0650\u0645\u0652 \u0622\u064A\u064E\u0627\u062A\u0650\u0643\u064E", ph: "Rabban\xE2 wab'ath f\xEEhim ras\xFBlan minhum yatl\xFB 'alayhim \xE2y\xE2tik", fr: "Seigneur, envoie parmi eux un messager issu d'eux qui leur r\xE9cite Tes versets \u2014 Dou'a d'Ibrahim" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0641\u064E\u0642\u0652\u0631\u0650 \u0648\u064E\u0627\u0644\u0642\u0650\u0644\u064E\u0651\u0629\u0650 \u0648\u064E\u0627\u0644\u0630\u0650\u0651\u0644\u064E\u0651\u0629\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minal-faqri wal-qillati wadh-dhillah", fr: "\xD4 Allah, je cherche refuge en Toi contre la pauvret\xE9, le manque et l'humiliation" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0623\u064E\u0646\u0652 \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064E\u0643\u064E \u0645\u064E\u0627 \u0644\u064E\u064A\u0652\u0633\u064E \u0644\u0650\u064A \u0628\u0650\u0647\u0650 \u0639\u0650\u0644\u0652\u0645\u064C", ph: "Rabbi inn\xEE a'\xFBdhu bika an as'alaka m\xE2 laysa l\xEE bihi 'ilm", fr: "Seigneur, je cherche refuge en Toi contre le fait de Te demander ce que je ne connais pas \u2014 Dou'a de N\xFBh" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0644\u064E\u0643\u064E \u0627\u0644\u062D\u064E\u0645\u0652\u062F\u064F \u0643\u064F\u0644\u064F\u0651\u0647\u064F \u0648\u064E\u0644\u064E\u0643\u064E \u0627\u0644\u0645\u064F\u0644\u0652\u0643\u064F \u0643\u064F\u0644\u064F\u0651\u0647\u064F", ph: "All\xE2humma lakal-hamdu kulluhu wa lakal-mulku kulluh", fr: "\xD4 Allah, toute la louange T'appartient et toute la royaut\xE9 T'appartient" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u0643\u0652\u062A\u064F\u0628\u0652\u0646\u064E\u0627 \u0645\u064E\u0639\u064E \u0627\u0644\u0634\u064E\u0651\u0627\u0647\u0650\u062F\u0650\u064A\u0646\u064E", ph: "Rabban\xE2 aktubna ma'ash-sh\xE2hid\xEEn", fr: "Seigneur, inscris-nous parmi les t\xE9moins" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u062A\u064E\u0651\u0648\u0652\u0641\u0650\u064A\u0642\u064E \u0644\u0650\u0645\u064E\u062D\u064E\u0627\u0628\u0650\u0651\u0643\u064E", ph: "All\xE2humma inn\xEE as'aluka at-tawf\xEEqa limah\xE2bbik", fr: "\xD4 Allah, je Te demande le succ\xE8s dans ce que Tu aimes" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0646\u064E\u062C\u0650\u0651\u0646\u0650\u064A \u0645\u0650\u0646\u064E \u0627\u0644\u0642\u064E\u0648\u0652\u0645\u0650 \u0627\u0644\u0638\u064E\u0651\u0627\u0644\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabbi najjin\xEE minal-qawmiz-z\xE2lim\xEEn", fr: "Seigneur, sauve-moi du peuple injuste \u2014 Dou'a de M\xFBsa" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0623\u064E\u0646\u0652 \u062A\u064E\u0631\u0652\u0632\u064F\u0642\u064E\u0646\u0650\u064A \u062D\u064E\u0644\u064E\u0627\u0644\u064B\u0627 \u0637\u064E\u064A\u0650\u0651\u0628\u064B\u0627", ph: "All\xE2humma inn\xEE as'aluka an tarzuqan\xEE hal\xE2lan tayyib\xE2n", fr: "\xD4 Allah, je Te demande de me accorder une subsistance licite et bonne" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0625\u0650\u0646\u064E\u0651\u0646\u064E\u0627 \u0622\u0645\u064E\u0646\u064E\u0651\u0627 \u0641\u064E\u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627 \u0648\u064E\u0623\u064E\u0646\u0652\u062A\u064E \u062E\u064E\u064A\u0652\u0631\u064F \u0627\u0644\u063A\u064E\u0627\u0641\u0650\u0631\u0650\u064A\u0646\u064E", ph: "Rabban\xE2 innan\xE2 \xE2mann\xE2 faghfir lan\xE2 wa anta khayrul-gh\xE2fir\xEEn", fr: "Seigneur, nous avons cru, pardonne-nous, Tu es le meilleur des Pardonneurs" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0623\u064E\u0631\u064E\u0642\u0650 \u0648\u064E\u0642\u0650\u0644\u064E\u0651\u0629\u0650 \u0627\u0644\u0646\u064E\u0651\u0648\u0652\u0645\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minal-araqi wa qillatun-nawm", fr: "\xD4 Allah, je cherche refuge en Toi contre l'insomnie et le manque de sommeil" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0644\u064E\u0643\u064E \u0634\u064E\u0627\u0643\u0650\u0631\u064B\u0627 \u0648\u064E\u0644\u0650\u0622\u0644\u064E\u0627\u0626\u0650\u0643\u064E \u0630\u064E\u0627\u0643\u0650\u0631\u064B\u0627", ph: "Rabbi aj'aln\xEE laka sh\xE2kiran wa li-\xE2l\xE2'ika dh\xE2kir\xE2", fr: "Seigneur, fais de moi quelqu'un qui Te remercie et qui mentionne Tes bienfaits" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0623\u064E\u0646\u0652 \u062A\u064F\u062D\u0650\u0628\u064E\u0651\u0646\u0650\u064A \u0648\u064E\u0623\u064E\u0646\u0652 \u062A\u064F\u062D\u0650\u0628\u064E\u0651 \u0645\u064E\u0646\u0652 \u064A\u064F\u062D\u0650\u0628\u064F\u0651\u0646\u0650\u064A \u0641\u0650\u064A\u0643\u064E", ph: "All\xE2humma inn\xEE as'aluka an tuhibban\xEE wa an tuhibba man yuhibbun\xEE f\xEEk", fr: "\xD4 Allah, je Te demande de m'aimer et d'aimer ceux qui m'aiment pour Toi" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0647\u064E\u0628\u0652 \u0644\u064E\u0646\u064E\u0627 \u0645\u0650\u0646\u0652 \u0623\u064E\u0632\u0652\u0648\u064E\u0627\u062C\u0650\u0646\u064E\u0627 \u0648\u064E\u0630\u064F\u0631\u0650\u0651\u064A\u064E\u0651\u0627\u062A\u0650\u0646\u064E\u0627 \u0642\u064F\u0631\u064E\u0651\u0629\u064E \u0623\u064E\u0639\u0652\u064A\u064F\u0646\u064D \u0648\u064E\u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0644\u0650\u0644\u0652\u0645\u064F\u062A\u064E\u0651\u0642\u0650\u064A\u0646\u064E \u0625\u0650\u0645\u064E\u0627\u0645\u064B\u0627", ph: "Rabban\xE2 hab lan\xE2 min azw\xE2jin\xE2 wa dhurriyy\xE2tin\xE2 qurrata a'yunin waj'aln\xE2 lil-muttaq\xEEna im\xE2m\xE2", fr: "Seigneur, accorde-nous la joie des yeux par nos \xE9pouses et nos enfants, et fais de nous un mod\xE8le pour les pieux" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0644\u064E\u0627 \u0633\u064E\u0647\u0652\u0644\u064E \u0625\u0650\u0644\u064E\u0651\u0627 \u0645\u064E\u0627 \u062C\u064E\u0639\u064E\u0644\u0652\u062A\u064E\u0647\u064F \u0633\u064E\u0647\u0652\u0644\u064B\u0627 \u0648\u064E\u0623\u064E\u0646\u0652\u062A\u064E \u062A\u064E\u062C\u0652\u0639\u064E\u0644\u064F \u0627\u0644\u062D\u064E\u0632\u064E\u0646\u064E \u0625\u0650\u0630\u064E\u0627 \u0634\u0650\u0626\u0652\u062A\u064E \u0633\u064E\u0647\u0652\u0644\u064B\u0627", ph: "All\xE2humma l\xE2 sahla ill\xE2 m\xE2 ja'altahu sahlan wa anta taj'alul-hazana idh\xE2 shi'ta sahl\xE2", fr: "\xD4 Allah, rien n'est facile sauf ce que Tu rends facile, et Tu rends la peine facile quand Tu le veux" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u0647\u064E\u0630\u064E\u0627 \u0627\u0644\u0628\u064E\u0644\u064E\u062F\u064E \u0623\u064E\u0645\u0650\u0646\u064B\u0627 \u0648\u064E\u0627\u062C\u0652\u0646\u064F\u0628\u0652\u0646\u0650\u064A \u0648\u064E\u0628\u064E\u0646\u0650\u064A\u064E\u0651 \u0627\u0644\u0634\u0650\u0651\u0631\u0652\u0643\u064E", ph: "Rabbi aj'al h\xE2dhal-balada aminan wajnubn\xEE wa baniyya ash-shirk", fr: "Seigneur, rends cette cit\xE9 s\xFBre et pr\xE9serve-moi ainsi que mes enfants du polyth\xE9isme" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0623\u064E\u0646\u0652 \u0623\u064F\u0634\u0652\u0631\u0650\u0643\u064E \u0628\u0650\u0643\u064E \u0634\u064E\u064A\u0652\u0626\u064B\u0627 \u0623\u064E\u0639\u0652\u0644\u064E\u0645\u064F\u0647\u064F", ph: "All\xE2humma inn\xEE a'\xFBdhu bika an ushrika bika shay'an a'lamuh", fr: "\xD4 Allah, je cherche refuge en Toi contre le fait de T'associer quelque chose sciemment" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0644\u064E\u0627 \u062A\u064E\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0641\u0650\u062A\u0652\u0646\u064E\u0629\u064B \u0644\u0650\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u0643\u064E\u0641\u064E\u0631\u064F\u0648\u0627 \u0648\u064E\u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627", ph: "Rabban\xE2 l\xE2 taj'aln\xE2 fitnatan lilladh\xEEna kafar\xFB waghfir lan\xE2", fr: "Seigneur, ne fais pas de nous une \xE9preuve pour les m\xE9cr\xE9ants et pardonne-nous" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u062E\u064E\u064A\u0652\u0631\u064E \u0632\u064E\u0627\u062F\u0650\u064A \u0627\u0644\u062A\u064E\u0651\u0642\u0652\u0648\u064E\u0649", ph: "All\xE2humma aj'al khayra z\xE2d\xEE at-taqw\xE2", fr: "\xD4 Allah, fais que la pi\xE9t\xE9 soit la meilleure de mes provisions" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0648\u064E\u0647\u064E\u0646\u064E \u0627\u0644\u0639\u064E\u0638\u0652\u0645\u064F \u0645\u0650\u0646\u0650\u0651\u064A \u0648\u064E\u0627\u0634\u0652\u062A\u064E\u0639\u064E\u0644\u064E \u0627\u0644\u0631\u064E\u0651\u0623\u0652\u0633\u064F \u0634\u064E\u064A\u0652\u0628\u064B\u0627", ph: "Rabbi inn\xEE wahana al-'azmu minn\xEE wash-ta'alar-ra'su shayb\xE2", fr: "Seigneur, mes os sont devenus faibles et ma t\xEAte est devenue toute blanche \u2014 Dou'a de Zakariyya" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0623\u064E\u0646\u0652 \u0623\u064E\u0643\u064F\u0648\u0646\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0645\u064F\u0642\u064E\u0631\u064E\u0651\u0628\u0650\u064A\u0646\u064E", ph: "All\xE2humma inn\xEE as'aluka an ak\xFBna minal-muqarrab\xEEn", fr: "\xD4 Allah, je Te demande d'\xEAtre parmi ceux qui sont proches de Toi" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0622\u0645\u064E\u0646\u064E\u0651\u0627 \u0628\u0650\u0645\u064E\u0627 \u0623\u064E\u0646\u0652\u0632\u064E\u0644\u0652\u062A\u064E \u0648\u064E\u0627\u062A\u064E\u0651\u0628\u064E\u0639\u0652\u0646\u064E\u0627 \u0627\u0644\u0631\u064E\u0651\u0633\u064F\u0648\u0644\u064E", ph: "Rabban\xE2 \xE2mann\xE2 bim\xE2 anzalta wattaba'nar-ras\xFBl", fr: "Seigneur, nous avons cru en ce que Tu as r\xE9v\xE9l\xE9 et nous avons suivi le Messager" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u0634\u064E\u0651\u064A\u0652\u0637\u064E\u0627\u0646\u0650 \u0627\u0644\u0631\u064E\u0651\u062C\u0650\u064A\u0645\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minash-shayt\xE2nir-raj\xEEm", fr: "\xD4 Allah, je cherche refuge en Toi contre Satan le maudit" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u0652 \u0645\u064E\u0633\u064E\u0627\u0626\u0650\u0644\u0650 \u0627\u0644\u062C\u064E\u0627\u0647\u0650\u0644\u0650\u064A\u0646\u064E", ph: "Rabbi inn\xEE a'\xFBdhu bika min mas\xE2'ilil-j\xE2hil\xEEn", fr: "Seigneur, je cherche refuge en Toi contre les demandes des ignorants" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0631\u0650\u0636\u064E\u0627\u0643\u064E \u0648\u064E\u0627\u0644\u062C\u064E\u0646\u064E\u0651\u0629\u064E", ph: "All\xE2humma inn\xEE as'aluka rid\xE2ka wal-jannah", fr: "\xD4 Allah, je Te demande Ta satisfaction et le Paradis" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u063A\u0652\u0641\u0650\u0631\u0652 \u0644\u064E\u0646\u064E\u0627 \u062E\u064E\u0637\u064E\u0627\u064A\u064E\u0627\u0646\u064E\u0627 \u0648\u064E\u0643\u064E\u0641\u0650\u0651\u0631\u0652 \u0639\u064E\u0646\u064E\u0651\u0627 \u0633\u064E\u064A\u0650\u0651\u0626\u064E\u0627\u062A\u0650\u0646\u064E\u0627", ph: "Rabban\xE2 aghfir lan\xE2 khat\xE2y\xE2n\xE2 wa kaffir 'ann\xE2 sayyi'\xE2tin\xE2", fr: "Seigneur, pardonne nos erreurs et expie nos mauvaises actions" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u062A\u064E\u0651\u0648\u0652\u0628\u064E\u0629\u064E \u0642\u064E\u0628\u0652\u0644\u064E \u0627\u0644\u0645\u064E\u0648\u0652\u062A\u0650", ph: "All\xE2humma inn\xEE as'aluka at-tawbata qablal-mawt", fr: "\xD4 Allah, je Te demande le repentir avant la mort" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u0642\u064F\u0644\u064F\u0648\u0628\u064E \u0639\u0650\u0628\u064E\u0627\u062F\u0650\u0643\u064E \u062A\u064E\u062A\u064E\u0651\u0642\u0650\u064A\u0643\u064E \u0648\u064E\u062A\u064E\u062E\u0652\u0634\u064E\u0627\u0643\u064E", ph: "Rabbi aj'al qul\xFBba 'ib\xE2dika tattaq\xEEka wa takhsh\xE2k", fr: "Seigneur, fais que les c\u0153urs de Tes serviteurs Te craignent et T'appr\xE9hendent" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u063A\u064E\u064A\u0652\u0628\u064E\u0629\u0650 \u0648\u064E\u0627\u0644\u0646\u064E\u0651\u0645\u0650\u064A\u0645\u064E\u0629\u0650", ph: "All\xE2humma inn\xEE a'\xFBdhu bika minal-gh\xEEbati wan-nam\xEEmah", fr: "\xD4 Allah, je cherche refuge en Toi contre la m\xE9disance et la calomnie" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0648\u064E\u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0645\u064F\u0633\u0652\u0644\u0650\u0645\u064E\u064A\u0652\u0646\u0650 \u0644\u064E\u0643\u064E \u0648\u064E\u0623\u064E\u0631\u0650\u0646\u064E\u0627 \u0645\u064E\u0646\u064E\u0627\u0633\u0650\u0643\u064E\u0646\u064E\u0627 \u0648\u064E\u062A\u064F\u0628\u0652 \u0639\u064E\u0644\u064E\u064A\u0652\u0646\u064E\u0627", ph: "Rabban\xE2 waj'aln\xE2 muslimayni laka wa arin\xE2 man\xE2sikan\xE2 wa tub 'alayn\xE2", fr: "Seigneur, fais de nous deux des soumis \xE0 Toi, montre-nous nos rites et reviens vers nous avec mis\xE9ricorde" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0645\u0650\u0646\u0652 \u062E\u064E\u064A\u0652\u0631\u0650 \u0645\u064E\u0627 \u0633\u064E\u0623\u064E\u0644\u064E\u0643\u064E \u0645\u0650\u0646\u0652\u0647\u064F \u0646\u064E\u0628\u0650\u064A\u064F\u0651\u0643\u064E \u0645\u064F\u062D\u064E\u0645\u064E\u0651\u062F\u064C", ph: "All\xE2humma inn\xEE as'aluka min khayri m\xE2 sa'alaka minhu nabiyyuka Muhammad", fr: "\xD4 Allah, je Te demande le bien de ce que Ton Proph\xE8te Muhammad \uFDFA T'a demand\xE9" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0623\u064E\u0641\u0652\u0631\u0650\u063A\u0652 \u0639\u064E\u0644\u064E\u064A\u0652\u0646\u064E\u0627 \u0635\u064E\u0628\u0652\u0631\u064B\u0627 \u0648\u064E\u062A\u064E\u0648\u064E\u0641\u064E\u0651\u0646\u064E\u0627 \u0645\u064F\u0633\u0652\u0644\u0650\u0645\u0650\u064A\u0646\u064E", ph: "Rabban\xE2 afrigh 'alayn\xE2 sabran wa tawaffan\xE2 muslim\xEEn", fr: "Seigneur, r\xE9pands sur nous la patience et fais-nous mourir en musulmans" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u0647\u0650\u062F\u064E\u0627\u064A\u064E\u0629\u064E \u0648\u064E\u0627\u0644\u0633\u064E\u0651\u062F\u064E\u0627\u062F\u064E", ph: "All\xE2humma inn\xEE as'alukal-hid\xE2yata was-sad\xE2d", fr: "\xD4 Allah, je Te demande la guidance et la rectitude" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u0652 \u0639\u064E\u0630\u064E\u0627\u0628\u0650 \u0627\u0644\u0642\u064E\u0628\u0652\u0631\u0650 \u0648\u064E\u0639\u064E\u0630\u064E\u0627\u0628\u0650 \u0627\u0644\u0646\u064E\u0651\u0627\u0631\u0650", ph: "Rabbi a'\xFBdhu bika min 'adh\xE2bil-qabri wa 'adh\xE2bin-n\xE2r", fr: "Seigneur, je cherche refuge en Toi contre le ch\xE2timent de la tombe et le ch\xE2timent du Feu" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u062E\u064E\u064A\u0652\u0631\u0650 \u0645\u064E\u0627 \u0639\u064E\u0644\u0650\u0645\u0652\u062A\u064F \u0645\u0650\u0646\u0652\u0647\u064F \u0648\u064E\u0645\u064E\u0627 \u0644\u064E\u0645\u0652 \u0623\u064E\u0639\u0652\u0644\u064E\u0645\u0652", ph: "All\xE2humma inn\xEE as'aluka minal-khayri m\xE2 'alimtu minhu wa m\xE2 lam a'lam", fr: "\xD4 Allah, je Te demande le bien que je connais et celui que je ne connais pas" },

    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0623\u064E\u062E\u0652\u0634\u064E\u0627\u0643\u064E \u062D\u064E\u062A\u064E\u0651\u0649 \u0643\u064E\u0623\u064E\u0646\u0650\u0651\u064A \u0623\u064E\u0631\u064E\u0627\u0643\u064E", ph: "All\xE2humma aj'aln\xEE akhsh\xE2ka hatt\xE2 ka-ann\xEE ar\xE2k", fr: "\xD4 Allah, fais que je Te craigne comme si je Te voyais" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0622\u062A\u0650\u0646\u064E\u0627 \u0645\u064E\u0627 \u0648\u064E\u0639\u064E\u062F\u0652\u062A\u064E\u0646\u064E\u0627 \u0639\u064E\u0644\u064E\u0649 \u0631\u064F\u0633\u064F\u0644\u0650\u0643\u064E", ph: "Rabban\xE2 \xE2tin\xE2 m\xE2 wa'adtan\xE2 'al\xE2 rusulika", fr: "Seigneur, accorde-nous ce que Tu nous as promis par Tes messagers" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0627\u0644\u0635\u0650\u0651\u062D\u064E\u0651\u0629\u064E \u0648\u064E\u0627\u0644\u0639\u064E\u0627\u0641\u0650\u064A\u064E\u0629\u064E \u0648\u064E\u0627\u0644\u0623\u064E\u0645\u064E\u0627\u0646\u064E", ph: "All\xE2humma inn\xEE as'alukas-sihhata wal-'\xE2fiyata wal-am\xE2n", fr: "\xD4 Allah, je Te demande la sant\xE9, le bien-\xEAtre et la s\xE9curit\xE9" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0623\u064E\u0639\u064F\u0648\u0630\u064F \u0628\u0650\u0643\u064E \u0645\u0650\u0646\u064E \u0627\u0644\u062E\u064F\u0630\u0652\u0644\u064E\u0627\u0646\u0650 \u0648\u064E\u0627\u0644\u062E\u064E\u064A\u0652\u0628\u064E\u0629\u0650", ph: "Rabbi a'\xFBdhu bika minal-khudhlan\xEE wal-khayba", fr: "Seigneur, je cherche refuge en Toi contre l'abandon et la d\xE9ception" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u064E\u0651\u0643\u064E \u0639\u064E\u0641\u064F\u0648\u064C\u0651 \u0643\u064E\u0631\u0650\u064A\u0645\u064C \u062A\u064F\u062D\u0650\u0628\u064F\u0651 \u0627\u0644\u0639\u064E\u0641\u0652\u0648\u064E \u0641\u064E\u0627\u0639\u0652\u0641\u064F \u0639\u064E\u0646\u0650\u0651\u064A", ph: "All\xE2humma innaka 'afuwwun kar\xEEmun tuhibbul-'afwa fa'fu 'ann\xEE", fr: "\xD4 Allah, Tu es Indulgent, G\xE9n\xE9reux, Tu aimes pardonner, alors pardonne-moi \u2014 Dou'a de Laylat al-Qadr" },
    { ar: "\u0631\u064E\u0628\u064E\u0651\u0646\u064E\u0627 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u064E\u0627 \u0634\u064E\u0627\u0643\u0650\u0631\u0650\u064A\u0646\u064E \u0644\u0650\u0646\u0650\u0639\u0652\u0645\u064E\u062A\u0650\u0643\u064E \u0645\u064F\u062B\u0652\u0646\u0650\u064A\u0646\u064E \u0628\u0650\u0647\u064E\u0627", ph: "Rabban\xE2 aj'aln\xE2 sh\xE2kir\xEEna lini'matika muthn\xEEna bih\xE2", fr: "Seigneur, fais de nous des reconnaissants pour Tes gr\xE2ces et fais que nous en fassions l'\xE9loge" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u064A\u064E\u0627 \u0627\u0644\u0644\u064E\u0651\u0647\u064F \u0628\u0650\u0623\u064E\u0646\u064E\u0651\u0643\u064E \u0627\u0644\u0648\u064E\u0627\u062D\u0650\u062F\u064F \u0627\u0644\u0623\u064E\u062D\u064E\u062F\u064F", ph: "All\xE2humma inn\xEE as'aluka y\xE2 All\xE2hu bi-annaka al-W\xE2hidu al-Ahad", fr: "\xD4 Allah, je Te demande, toi qui est l'Unique, l'Un" },

    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652\u0646\u0650\u064A \u0645\u0650\u0646\u064E \u0627\u0644\u064E\u0651\u0630\u0650\u064A\u0646\u064E \u0622\u0645\u064E\u0646\u064F\u0648\u0627 \u0648\u064E\u0639\u064E\u0645\u0650\u0644\u064F\u0648\u0627 \u0627\u0644\u0635\u064E\u0651\u0627\u0644\u0650\u062D\u064E\u0627\u062A\u0650", ph: "All\xE2humma aj'aln\xEE minal-ladh\xEEna \xE2man\xFB wa 'amil\xFBs-s\xE2lih\xE2t", fr: "\xD4 Allah, fais de moi ceux qui ont cru et accompli les bonnes \u0153uvres" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u062C\u0652\u0639\u064E\u0644\u0652 \u0647\u064E\u0630\u064E\u0627 \u0627\u0644\u064A\u064E\u0648\u0652\u0645\u064E \u062E\u064E\u064A\u0652\u0631\u064B\u0627 \u0644\u0650\u064A \u0648\u064E\u0644\u0650\u0623\u064F\u0645\u064E\u0651\u062A\u0650\u064A", ph: "Rabbi aj'al h\xE2dhal-yawma khayran l\xEE wa li-ummat\xEE", fr: "Seigneur, fais de ce jour un bien pour moi et pour ma communaut\xE9" },
    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0628\u0650\u0646\u064F\u0648\u0631\u0650\u0643\u064E \u0627\u0647\u0652\u062A\u064E\u062F\u064E\u064A\u0652\u0646\u064E\u0627 \u0648\u064E\u0628\u0650\u0641\u064E\u0636\u0652\u0644\u0650\u0643\u064E \u0627\u0633\u0652\u062A\u064E\u063A\u0652\u0646\u064E\u064A\u0652\u0646\u064E\u0627", ph: "All\xE2humma bin\xFBrika ihtadayn\xE2 wa bifadlika istaghnayn\xE2", fr: "\xD4 Allah, c'est par Ta lumi\xE8re que nous sommes guid\xE9s et par Ta gr\xE2ce que nous nous suffisons" },

    { ar: "\u0627\u0644\u0644\u064E\u0651\u0647\u064F\u0645\u064E\u0651 \u0625\u0650\u0646\u0650\u0651\u064A \u0623\u064E\u0633\u0652\u0623\u064E\u0644\u064F\u0643\u064E \u0631\u064E\u062D\u0652\u0645\u064E\u0629\u064B \u0645\u0650\u0646\u0652 \u0639\u0650\u0646\u0652\u062F\u0650\u0643\u064E", ph: "All\xE2humma inn\xEE as'aluka rahmatan min 'indik", fr: "\xD4 Allah, je Te demande une mis\xE9ricorde venant de Toi" },
    { ar: "\u0631\u064E\u0628\u0650\u0651 \u0627\u0646\u0652\u0635\u064F\u0631\u0652\u0646\u0650\u064A \u0639\u064E\u0644\u064E\u0649 \u0627\u0644\u0642\u064E\u0648\u0652\u0645\u0650 \u0627\u0644\u0645\u064F\u0641\u0652\u0633\u0650\u062F\u0650\u064A\u0646\u064E", ph: "Rabbi ansurn\xEE 'alal-qawmil-mufsid\xEEn", fr: "Seigneur, aide-moi contre le peuple des corrupteurs \u2014 Dou'a de Lut" },

    { name: "Yunus \u{1F40B}", clues: ["J'ai quitt\xE9 mon peuple sans la permission d'Allah, d\xE9\xE7u de leurs refus r\xE9p\xE9t\xE9s.", "Sur un navire pris dans la temp\xEAte, le sort est tomb\xE9 sur moi. J'ai \xE9t\xE9 jet\xE9 \xE0 la mer.", "Une grande baleine m'a aval\xE9. Dans ses profondeurs obscures, j'ai pri\xE9 : 'L\xE2 il\xE2ha ill\xE2 Anta, subh\xE2naka !'", "Allah a exauc\xE9 ma pri\xE8re. La baleine m'a recrach\xE9 sur une rive. Mon peuple s'est ensuite converti en masse."] },
    { name: "Ayyub \u{1F4AA}", clues: ["J'\xE9tais riche, en bonne sant\xE9, avec une grande famille. Puis Allah m'a tout pris comme \xE9preuve.", "J'ai souffert d'une terrible maladie pendant de tr\xE8s longues ann\xE9es sans jamais perdre foi.", "Ma supplication : 'Rabbi ann\xEE massaniya ad-durru wa anta arhamur-r\xE2him\xEEn' est c\xE9l\xE8bre.", "Allah m'a gu\xE9ri, a doubl\xE9 mes biens et rendu ma famille. Je suis le symbole de la patience absolue."] },
    { name: "Ibrahim P\xE8re + Isma'il \u{1F54B}", clues: ["Nous sommes p\xE8re et fils, tous deux proph\xE8tes d'Allah.", "Ensemble, nous avons construit la Ka'ba \xE0 La Mecque sur ordre d'Allah.", "Le p\xE8re a failli sacrifier son fils sur ordre divin. Le fils a accept\xE9 avec foi totale.", "Nous prions : 'Rabban\xE2 taqabbal minn\xE2 \u2014 Seigneur, accepte de nous !'"] },
    { name: "Hud \u{1F30A}", clues: ["J'ai \xE9t\xE9 envoy\xE9 au peuple 'Ad, une nation puissante et orgueilleuse qui adorait des idoles.", "Ils disaient : 'Qui est plus fort que nous ?' Moi, je les appelais \xE0 adorer Allah Seul.", "Ils ont refus\xE9 de m'\xE9couter et m'ont trait\xE9 de menteur et d'insens\xE9.", "Allah a envoy\xE9 un vent furieux pendant 7 nuits et 8 jours. Le peuple 'Ad a \xE9t\xE9 an\xE9anti."] },
    { name: "Salih \u{1F42A}", clues: ["J'ai \xE9t\xE9 envoy\xE9 au peuple Thamud qui vivait dans des maisons taill\xE9es dans la roche.", "Allah a fait sortir miraculeusement une chamelle du rocher comme signe de Sa puissance.", "J'ai averti : 'Ne faites pas de mal \xE0 cette chamelle, sinon un ch\xE2timent douloureux vous atteindra !'", "Les plus arrogants ont tu\xE9 la chamelle. Trois jours apr\xE8s, un cri terrible a d\xE9truit tout le peuple."] },
    { name: "Lut \u{1F3D9}\uFE0F", clues: ["Je suis le neveu du proph\xE8te Ibrahim. J'ai \xE9migr\xE9 avec lui depuis Ur (Irak).", "J'ai \xE9t\xE9 envoy\xE9 dans les cit\xE9s de Sodome et Gomorrhe aux m\u0153urs tr\xE8s corrompues.", "Des anges sous forme d'hommes sont venus chez moi. Les habitants voulaient leur faire du mal.", "Les anges m'ont dit : 'Pars cette nuit avec ta famille !' Les cit\xE9s ont \xE9t\xE9 renvers\xE9es et d\xE9truites."] },
    { name: "Ya'qub \u{1F31F}", clues: ["Je suis le fils d'Is'haq et le petit-fils d'Ibrahim. Je suis surnomm\xE9 'Isra\xEBl'.", "J'ai 12 fils qui formeront les 12 tribus d'Isra\xEBl. Mon fils pr\xE9f\xE9r\xE9 s'appelle Y\xFBsuf.", "Quand mes fils ont pr\xE9tendu que Y\xFBsuf avait \xE9t\xE9 mang\xE9 par un loup, j'ai refus\xE9 de les croire.", "J'ai pleur\xE9 si fort la disparition de Y\xFBsuf que j'ai perdu la vue. Elle m'est revenue \xE0 son retour."] },
    { name: "Maryam \u{1F338}", clues: ["Je suis la seule femme mentionn\xE9e nomm\xE9ment dans le Coran, dans une sourate enti\xE8re \xE0 mon nom.", "Je me suis consacr\xE9e enti\xE8rement \xE0 l'adoration d'Allah depuis toute petite, sous la garde de Zakariyya.", "L'ange Jibr\xEEl m'est apparu et m'a annonc\xE9 que j'allais avoir un enfant sans qu'aucun homme me touche.", "Je suis la m\xE8re du proph\xE8te Issa. Ma vertu et ma puret\xE9 sont cit\xE9es en exemple dans le Coran."] },
    { name: "Zakariyya \u{1F33A}", clues: ["Je suis proph\xE8te et gardien de Maryam dans le temple. Je lui apportais de la nourriture.", "Vieux et dont la femme \xE9tait st\xE9rile, j'ai quand m\xEAme suppli\xE9 Allah de me donner un fils.", "Ma dou'a : 'Rabbi habl\xEE min ladunka dhurriyyatan tayyibatan \u2014 Seigneur, donne-moi une bonne descendance.'", "Allah m'a annonc\xE9 la naissance d'un fils : Yahya. Je m'en suis \xE9tonn\xE9 mais j'ai remerci\xE9 Allah."] },
    { name: "Yahya \u{1F4A7}", clues: ["Mon p\xE8re est le proph\xE8te Zakariyya. Ma naissance fut un miracle : mes parents \xE9taient trop vieux.", "Je suis le seul \xE0 porter ce pr\xE9nom \u2014 Allah dit : 'Nous n'avons donn\xE9 ce pr\xE9nom \xE0 personne avant lui.'", "Allah m'a dit : '\xD4 Yahya, tiens fermement le Livre.' J'ai re\xE7u la sagesse d\xE8s l'enfance.", "Je suis connu pour ma pi\xE9t\xE9, ma puret\xE9 et mon respect envers mes parents. Je ne suis pas arrogant."] },
    { name: "Harun \u{1F5E3}\uFE0F", clues: ["Je suis le fr\xE8re a\xEEn\xE9 du proph\xE8te M\xFBsa et son plus fid\xE8le soutien.", "M\xFBsa a demand\xE9 \xE0 Allah : 'Donne-moi un aide de ma famille \u2014 mon fr\xE8re Harun !'", "J'\xE9tais plus \xE9loquent que M\xFBsa dans la parole. J'ai aid\xE9 \xE0 transmettre le message au Pharaon.", "Ensemble, M\xFBsa et moi avons affront\xE9 Pharaon avec l'autorisation d'Allah."] },
    { name: "Shu'ayb \u2696\uFE0F", clues: ["J'ai \xE9t\xE9 envoy\xE9 au peuple de Madyan qui fraudait dans les poids et les mesures.", "Je les ai appel\xE9s : 'Donnez la juste mesure et ne l\xE9sez pas les gens dans leurs biens !'", "Mon peuple m'a r\xE9pondu : 'Tes pri\xE8res t'ordonnent-elles d'abandonner ce que nos p\xE8res adoraient ?'", "Une terrible secousse a d\xE9truit le peuple de Madyan qui m'avait rejet\xE9. Comme si Madyan n'avait jamais exist\xE9."] },
    { name: "Idris \u{1F4DC}", clues: ["Je suis le 2\xE8me proph\xE8te apr\xE8s Adam dans l'ordre chronologique.", "Je suis mentionn\xE9 dans le Coran comme 'homme de v\xE9rit\xE9' et proph\xE8te d'une haute \xE9l\xE9vation.", "Selon la tradition, je suis l'un des premiers \xE0 \xE9crire avec une plume et \xE0 ma\xEEtriser l'astronomie.", "Allah dit de moi : 'Nous l'avons \xE9lev\xE9 en un lieu sublime.' Je suis souvent identifi\xE9 \xE0 H\xE9noch."] },
    { name: "Is'haq \u2B50", clues: ["Je suis le fils du proph\xE8te Ibrahim et de sa femme Sara, tous deux tr\xE8s \xE2g\xE9s \xE0 ma naissance.", "Ma naissance \xE9tait consid\xE9r\xE9e impossible. Allah a dit : 'Je fais ce que Je veux.'", "Je suis fr\xE8re d'Isma'il \u2014 nous sommes tous deux fils d'Ibrahim mais de m\xE8res diff\xE9rentes.", "De ma descendance na\xEEtront Ya'qub, puis Y\xFBsuf, M\xFBsa, Dawud, Sulayman et Issa."] },
    { name: "Ilyas \u26F0\uFE0F", clues: ["J'ai \xE9t\xE9 envoy\xE9 aux Fils d'Isra\xEBl qui adoraient l'idole Baal.", "Je leur ai dit : 'N'adorez-vous pas Allah ? N'\xE9prouvez-vous pas de la crainte ?'", "Ma mission a \xE9t\xE9 difficile et mon peuple m'a largement rejet\xE9.", "Je suis cit\xE9 dans le Coran parmi les proph\xE8tes excellents : 'Et Ilyas \xE9tait du nombre des envoy\xE9s.'"] },
    { name: "Al-Yasa' \u{1F33F}", clues: ["Je suis le successeur et disciple du proph\xE8te Ilyas.", "Allah me cite dans le Coran aux c\xF4t\xE9s d'Isma\xEBl, Yunus et Lut comme parmi les pr\xE9f\xE9r\xE9s d'Allah.", "Je suis souvent identifi\xE9 au proph\xE8te biblique \xC9lis\xE9e dans les traditions abrahamiques.", "Mon histoire rappelle l'importance de transmettre la guidance d'un proph\xE8te \xE0 l'autre."] },
    { name: "Dhul-Kifl \u{1F54A}\uFE0F", clues: ["Mon nom signifie 'celui qui a une double r\xE9compense' ou 'celui de la responsabilit\xE9'.", "Je suis cit\xE9 dans le Coran parmi les patients : aux c\xF4t\xE9s d'Isma\xEBl et Idris.", "J'ai tenu mes engagements envers Allah avec une constance et une pers\xE9v\xE9rance remarquables.", "Allah dit de moi : 'Nous les avons admis dans Notre mis\xE9ricorde car ils \xE9taient parmi les gens de bien.'"] },
    { name: "Abu Bakr As-Siddiq", clues: ["Je suis le meilleur ami du Proph\xE8te \uFDFA depuis la jahiliyya (avant l'Islam).", "J'ai \xE9t\xE9 le premier homme adulte libre \xE0 embrasser l'Islam.", "Lors de la Hijra, j'ai accompagn\xE9 le Proph\xE8te \uFDFA dans la grotte de Thawr pendant 3 jours.", "Je suis le 1er calife de l'Islam. Mon surnom est 'As-Siddiq' (le V\xE9ridique)."] },
    { name: "Omar ibn al-Khattab", clues: ["Avant de me convertir, j'\xE9tais l'un des ennemis les plus farouches de l'Islam.", "Ma conversion a \xE9t\xE9 un tournant \u2014 les musulmans ont pu prier ouvertement \xE0 La Mecque.", "Mon surnom est 'Al-Faruq' \u2014 celui qui distingue le vrai du faux.", "Je suis le 2\xE8me calife de l'Islam. Mon r\xE8gne a vu l'expansion de l'empire islamique."] },
    { name: "Khadija bint Khuwaylid", clues: ["Je suis la premi\xE8re femme \xE0 avoir embrass\xE9 l'Islam dans toute l'histoire.", "J'\xE9tais une riche marchande respect\xE9e de La Mecque. J'ai propos\xE9 le mariage au Proph\xE8te \uFDFA.", "Quand le Proph\xE8te \uFDFA est revenu tremblant de la grotte Hir\xE2, je l'ai r\xE9confort\xE9 et soutenu.", "Je suis la premi\xE8re et la plus aim\xE9e des \xE9pouses du Proph\xE8te \uFDFA. Je suis la m\xE8re de Fatima."] },
    { name: "Fatima az-Zahra", clues: ["Je suis la fille bien-aim\xE9e du Proph\xE8te Muhammad \uFDFA et de Khadija.", "Le Proph\xE8te \uFDFA disait en me voyant : 'Fatima est une partie de moi.'", "Mon mari est Ali ibn Abi Talib, cousin du Proph\xE8te \uFDFA. Nous avons deux fils : Hasan et Husayn.", "Je suis surnomm\xE9e 'Az-Zahra' (la Lumineuse) et 'Sayyidat an-Nis\xE2' (ma\xEEtresse des femmes du paradis)."] }

  const RIHLA_KEY = "rihla_progress";
  const LIVES_KEY = "rihla_lives";
  const LIVES_MAX = 5;
  const LIVES_REGEN_MS = 2 * 60 * 60 * 1000;

  const getRihlaProgress = () => {
    try { return JSON.parse(localStorage.getItem(RIHLA_KEY) || "{}"); }
    catch { return {}; }
  };

  const saveRihlaProgress = (data) => {
    try { localStorage.setItem(RIHLA_KEY, JSON.stringify(data)); } catch {}
  };

  const getLivesData = () => {
    try {
      const d = JSON.parse(localStorage.getItem(LIVES_KEY) || "null");
      if (!d) return { lives: LIVES_MAX, lastRegen: Date.now() };
      const now = Date.now();
      const regenCount = Math.floor((now - d.lastRegen) / LIVES_REGEN_MS);
      if (regenCount > 0) {
        d.lives = Math.min(LIVES_MAX, d.lives + regenCount);
        d.lastRegen = d.lastRegen + regenCount * LIVES_REGEN_MS;
      }
      return d;
    } catch { return { lives: LIVES_MAX, lastRegen: Date.now() }; }
  };

  const saveLivesData = (data) => {
    try { localStorage.setItem(LIVES_KEY, JSON.stringify(data)); } catch {}
  };

  const getMedal = (pts) => {
    if (pts >= 360) return { icon: "🥇", label: "Or", color: "#ffd700" };
    if (pts >= 280) return { icon: "🥈", label: "Argent", color: "#c0c0c0" };
    if (pts >= 200) return { icon: "🥉", label: "Bronze", color: "#cd7f32" };
    return null;
  };

  const canUnlock = (stageId, progress) => {
    if (stageId === 1) return true;
    const prev = progress["etape" + (stageId - 1)];
    if (!prev || prev.best < 200) return false;
    if (stageId >= 3) {
      const prev2 = progress["etape" + (stageId - 2)];
      if (!prev2 || prev2.best < 360) return false;
    }
    return true;
  };
